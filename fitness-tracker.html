<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新手健身追踪器 · 胸肩背三分化</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #121418; --bg-card: #1e2127; --bg-card-hover: #262a32; --border: #2a2d36;
  --primary: #ff6b35; --primary-dim: rgba(255,107,53,0.10);
  --secondary: #4ecdc4; --secondary-dim: rgba(78,205,196,0.10);
  --text: #e4e2df; --text-secondary: #a09d98; --text-muted: #6b6864; --danger: #e85d75;
  --back: #4ecdc4; --chest: #ff6b35; --shoulder: #f0c040; --rest: #5c5a57;
  --radius: 10px; --radius-sm: 6px;
  --font: "Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,-apple-system,sans-serif;
}
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.app { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; }

.header { background: var(--bg-card); border-radius: var(--radius); padding: 28px 24px 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.header.back::before { background: var(--back); }
.header.chest::before { background: var(--chest); }
.header.shoulder::before { background: var(--shoulder); }
.header.rest::before { background: var(--rest); }
.day-emoji { font-size: 48px; display: block; margin-bottom: 6px; line-height: 1; }
.day-label { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 4px; }
.day-title { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
.header.back .day-title { color: var(--back); }
.header.chest .day-title { color: var(--chest); }
.header.shoulder .day-title { color: var(--shoulder); }
.header.rest .day-title { color: var(--rest); }
.motivation { font-size: 15px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.7; }
.today-date { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.skip-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: all 0.2s; }
.skip-btn:hover { border-color: var(--danger); color: var(--danger); }

.cycle-bar { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; border: 1px solid var(--border); }
.cycle-bar h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.cycle-days { display: flex; gap: 8px; justify-content: center; }
.cycle-day { flex: 1; max-width: 90px; text-align: center; padding: 12px 8px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid transparent; transition: all 0.2s; }
.cycle-day.today { border-color: var(--primary); background: var(--primary-dim); transform: scale(1.05); }
.cycle-day .cyc-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
.cycle-day .cyc-emoji { font-size: 20px; display: block; margin-bottom: 2px; }
.cycle-day .cyc-label { font-size: 12px; font-weight: 600; }
.cycle-day.back .cyc-label { color: var(--back); }
.cycle-day.chest .cyc-label { color: var(--chest); }
.cycle-day.shoulder .cyc-label { color: var(--shoulder); }
.cycle-day.rest { opacity: 0.5; }
.cycle-day.rest .cyc-label { color: var(--rest); }

.section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.exercise-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; cursor: pointer; }
.exercise-card:hover { border-color: #3a3d47; }
.exercise-card.expanded { border-color: var(--primary); }
.card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; user-select: none; }
.card-index { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-dim); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 16px; font-weight: 600; }
.card-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.card-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.3s; flex-shrink: 0; }
.exercise-card.expanded .card-arrow { transform: rotate(180deg); }

.card-detail { display: none; padding: 0 18px 20px; border-top: 1px solid var(--border); }
.exercise-card.expanded .card-detail { display: block; }

.params-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 13px; }
.params-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
.params-table tr:last-child { border-bottom: none; }
.params-table td { padding: 7px 6px; vertical-align: top; }
.params-table td:first-child { color: var(--text-muted); width: 90px; white-space: nowrap; font-weight: 600; font-size: 12px; }
.params-table td:last-child { color: var(--text-secondary); }
.params-table .val-highlight { color: var(--primary); font-weight: 600; }

.detail-section { margin-bottom: 14px; }
.detail-section h4 { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

.step-list { list-style: none; padding: 0; }
.step-list li { position: relative; padding-left: 24px; margin-bottom: 6px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.step-list li::before { content: attr(data-step); position: absolute; left: 0; top: 0; font-size: 11px; font-weight: 700; color: var(--primary); width: 18px; text-align: center; }

.mistake-list { list-style: none; padding: 0; }
.mistake-list li { position: relative; padding-left: 20px; margin-bottom: 5px; font-size: 14px; color: var(--danger); line-height: 1.6; }
.mistake-list li::before { content: '⚠'; position: absolute; left: 0; top: 0; font-size: 12px; }

.video-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.mw-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-dim); color: var(--primary); border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background 0.2s; }
.mw-link:hover { background: rgba(255,107,53,0.2); }
.bili-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--secondary-dim); color: var(--secondary); border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background 0.2s; }
.bili-link:hover { background: rgba(78,205,196,0.2); }

.tag-nav { display: flex; gap: 8px; margin-bottom: 16px; background: var(--bg-card); border-radius: 24px; padding: 4px; border: 1px solid var(--border); }
.tag-btn { flex: 1; padding: 10px; border: none; border-radius: 20px; background: transparent; color: var(--text-muted); font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s; }
.tag-btn.active { background: var(--primary); color: #fff; }
.tag-btn:hover:not(.active) { color: var(--text); }

.rest-day-hint { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 40px 24px; text-align: center; }
.rest-day-hint .rest-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
.rest-day-hint h3 { font-size: 20px; margin-bottom: 8px; color: var(--text-secondary); }
.rest-day-hint p { color: var(--text-muted); font-size: 14px; line-height: 1.7; max-width: 400px; margin: 0 auto; }

.settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.settings-section summary { cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); list-style: none; display: flex; align-items: center; gap: 6px; }
.settings-section summary::-webkit-details-marker { display: none; }
.settings-section summary::before { content: '⚙'; font-size: 16px; }
.settings-body { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.settings-body label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
.settings-row { display: flex; gap: 8px; align-items: center; }
.settings-row input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: var(--font); }
.settings-row input:focus { outline: none; border-color: var(--primary); }
.settings-row button { padding: 10px 18px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--font); }
.settings-row button:hover { opacity: 0.9; }
.settings-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s, transform 0.3s; box-shadow: 0 4px 20px rgba(255,107,53,0.3); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; max-width: 380px; width: 90%; text-align: center; }
.modal-box h3 { margin-bottom: 8px; font-size: 18px; }
.modal-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; justify-content: center; }
.modal-actions button { padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); border: none; }
.btn-cancel { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-confirm { background: var(--danger); color: #fff; }

@media (max-width: 600px) {
  .app { padding: 12px 10px 40px; }
  .header { padding: 22px 16px 18px; }
  .day-title { font-size: 26px; }
  .card-header { padding: 14px; gap: 10px; }
  .card-detail { padding: 0 12px 16px; }
  .cycle-day { padding: 8px 4px; }
  .cycle-day .cyc-emoji { font-size: 16px; }
  .params-table td:first-child { width: 70px; font-size: 11px; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header" id="header">
    <span class="day-emoji" id="dayEmoji"></span>
    <div class="day-label" id="dayLabel"></div>
    <h1 class="day-title" id="dayTitle"></h1>
    <p class="motivation" id="motivation"></p>
    <p class="today-date" id="todayDate"></p>
    <button class="skip-btn" id="skipBtn" title="有事跳过，计划顺延一天">⏭ 今天练不了，顺延一天</button>
  </header>

  <div class="cycle-bar" id="cycleBar"></div>

  <section id="todaySection">
    <h2 class="section-title">📋 今日训练</h2>
    <div class="exercise-list" id="todayList"></div>
  </section>

  <section id="restSection" style="display:none;"></section>

  <section class="library-section">
    <h2 class="section-title">📚 全部动作库（数据来源：MuscleWiki）</h2>
    <div class="tag-nav" id="tagNav">
      <button class="tag-btn active" data-muscle="back">🔵 背（6个动作）</button>
      <button class="tag-btn" data-muscle="chest">🟠 胸（6个动作）</button>
      <button class="tag-btn" data-muscle="shoulder">🟡 肩（6个动作）</button>
    </div>
    <div class="exercise-list" id="libraryList"></div>
  </section>

  <details class="settings-section" id="settingsPanel">
    <summary>设置</summary>
    <div class="settings-body">
      <label>训练起始日期（修改后计划将重新对齐）</label>
      <div class="settings-row">
        <input type="date" id="startDateInput">
        <button id="saveStartDate">保存</button>
      </div>
      <p class="settings-hint">起始日为<b>背日</b>，按 背→胸→肩→休息 4 日循环</p>
    </div>
  </details>
</div>

<div class="modal-overlay" id="skipModal">
  <div class="modal-box">
    <h3>确认跳过今天？</h3>
    <p>计划将整体顺延一天，明天的训练变成今天的计划。</p>
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancel">取消</button>
      <button class="btn-confirm" id="btnConfirm">确认顺延</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================================
// 核心常量
// ============================================================================
const CYCLE = ['back', 'chest', 'shoulder', 'rest'];
const CYCLE_NAMES = { back:'背日', chest:'胸日', shoulder:'肩日', rest:'休息日' };
const MOTIVATIONS = {
  back:'打造倒三角，从每一次下拉开始',
  chest:'推起重量，推起自信',
  shoulder:'宽肩撑起气场，饱满三角肌',
  rest:'肌肉在休息时生长，好好恢复 💤'
};
const REST_TIPS = [
  '充足的睡眠（7-8小时）是肌肉生长的黄金时间',
  '今天可以做轻度有氧或拉伸，促进血液循环',
  '蛋白质摄入不要断，休息日同样需要营养',
  '泡沫轴放松是个好选择，缓解前几天的酸痛',
  '多喝水，肌肉修复需要充足的水分',
];

// ============================================================================
// LocalStorage
// ============================================================================
const STORAGE_KEY = 'ft_start_date';
function getStartDate() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { const d = new Date(raw); if (!isNaN(d)) return d; }
  const today = new Date(); today.setHours(0,0,0,0); saveStartDate(today); return today;
}
function saveStartDate(d) { localStorage.setItem(STORAGE_KEY, d.toISOString().split('T')[0]); }
function getDaysDiff() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.floor((today - start) / 86400000);
}
function getTodayMuscle() { return CYCLE[getDaysDiff() % 4]; }
function skipToday() { const s = getStartDate(); s.setDate(s.getDate()-1); saveStartDate(s); }

// ============================================================================
// 动作数据 — 全部来自 MuscleWiki (musclewiki.com)，15个精确匹配 + 3个备选
// 每个动作对应：MuscleWiki 动画演示页 + B站中文教学视频

    warmup:'1×15（轻重量，激活背部神经连接）',

      '用背部发力将横杆下拉至锁骨上方，肘尖始终保持指向地面',

    ],
    mistakes:[
      '用手臂猛拉而非背部发力——想象双手只是"钩子"，发力点在背阔肌',

      '耸肩导致斜方肌过度参与——时刻保持沉肩，肩膀远离耳朵'
    ]
  },
  {

    ]
  },
  {

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function renderAll() {
  const m = getTodayMuscle();
  renderHeader(m);
  renderCycleBar();
  if (m === 'rest') { renderRestDay(); } else { renderTodayWorkout(m); }
  renderLibrary(currentLibTab);
}

function renderHeader(muscle) {
  const h = $('#header');
  h.className = 'header ' + muscle;
  $('#dayEmoji').textContent = {back:'💪',chest:'🔥',shoulder:'🏋️',rest:'😴'}[muscle];
  $('#dayLabel').textContent = CYCLE_NAMES[muscle];
  $('#dayTitle').textContent = CYCLE_NAMES[muscle];
  $('#motivation').textContent = MOTIVATIONS[muscle];
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  $('#todayDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${wd[now.getDay()]}`;
}

function renderCycleBar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const mod = getDaysDiff() % 4;
  const em = {back:'💪',chest:'🔥',shoulder:'🏋️',rest:'😴'};
  let h = '<h3>📅 训练周期（4日循环：背→胸→肩→休息）</h3><div class="cycle-days">';
  for (let o = -2; o <= 2; o++) {
    const d = new Date(today); d.setDate(d.getDate()+o);
    const m = CYCLE[((mod+o)%4+4)%4];
    h += `<div class="cycle-day ${m}${o===0?' today':''}">
      <span class="cyc-date">${d.getMonth()+1}/${d.getDate()}</span>
      <span class="cyc-emoji">${em[m]}</span>
      <span class="cyc-label">${CYCLE_NAMES[m]}</span></div>`;
  }
  h += '</div>';
  $('#cycleBar').innerHTML = h;
}

function renderTodayWorkout(muscle) {
  $('#restSection').style.display = 'none';
  $('#todaySection').style.display = 'block';
  // 今日只显示前5个正式动作（备选动作在动作库中可见）
  const exs = EXERCISES.filter(e => e.muscle === muscle).slice(0, 5);
  $('#todayList').innerHTML = exs.map((ex,i) => makeCard(ex,i)).join('');
}

function renderRestDay() {
  $('#todaySection').style.display = 'none';
  const tip = REST_TIPS[Math.floor(Math.random()*REST_TIPS.length)];
  $('#restSection').style.display = 'block';
  $('#restSection').innerHTML = `
    <div class="rest-day-hint">
      <span class="rest-emoji">😴</span>
      <h3>今天是休息日</h3><p>${tip}</p>
      <p style="margin-top:12px;font-size:13px;">明天继续：<strong style="color:var(--back)">背日</strong></p>
    </div>`;
}

// ============================================================================
// 动作卡片
// ============================================================================
function makeCard(ex, index) {
  return `
  <div class="exercise-card" data-id="${ex.id}">
    <div class="card-header" onclick="toggleCard(this)">
      <div class="card-index">${String(index+1).padStart(2,'0')}</div>
      <div class="card-info">
        <div class="card-name">${ex.name} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">${ex.nameEn}</span></div>
        <div class="card-meta"><span>📊 ${ex.working}</span><span>⏱ ${ex.rest}</span></div>
      </div>
      <div class="card-arrow">▼</div>
    </div>
    <div class="card-detail">
      <table class="params-table">
        <tr><td>🏋️ 器械</td><td>${ex.equipment}</td></tr>
        <tr><td>🔥 热身组</td><td>${ex.warmup}</td></tr>
        <tr><td>💪 正式组</td><td><span class="val-highlight">${ex.working}</span></td></tr>
        <tr><td>⏱ 组间休息</td><td>${ex.rest}</td></tr>
        <tr><td>🎯 动作节奏</td><td>${ex.tempo}</td></tr>
      </table>
      <div class="detail-section">
        <h4>📝 动作要领</h4>
        <ol class="step-list">${ex.steps.map((s,i) => `<li data-step="${String(i+1).padStart(2,'0')}">${s}</li>`).join('')}</ol>
      </div>
      <div class="detail-section">
        <h4>⚠️ 常见错误</h4>
        <ul class="mistake-list">${ex.mistakes.map(m => `<li>${m}</li>`).join('')}</ul>
      </div>
      <div class="video-links">
        <a class="mw-link" href="https://musclewiki.com/zh-cn/exercise/${ex.mwSlug}" target="_blank" rel="noopener">
          🎬 MuscleWiki 动作演示（GIF动画 + 肌肉图解）
        </a>
        <a class="bili-link" href="https://www.bilibili.com/video/${ex.bv}" target="_blank" rel="noopener">
          ▶ B站中文教学视频
        </a>
      </div>
    </div>
  </div>`;
}

function toggleCard(headerEl) {
  const card = headerEl.parentElement;
  $$('.exercise-card.expanded').forEach(c => { if (c !== card) c.classList.remove('expanded'); });
  card.classList.toggle('expanded');
}

// ============================================================================
// 动作库（显示全部6个，含备选动作）
// ============================================================================
let currentLibTab = 'back';
function renderLibrary(muscle) {
  const exs = EXERCISES.filter(e => e.muscle === muscle);
  $('#libraryList').innerHTML = exs.map((ex,i) => makeCard(ex,i)).join('');
}
$$('.tag-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    $$('.tag-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    currentLibTab = this.dataset.muscle;
    renderLibrary(currentLibTab);
  });
});

// ============================================================================
// 跳过今天
// ============================================================================
$('#skipBtn').addEventListener('click', () => $('#skipModal').classList.add('show'));
$('#btnCancel').addEventListener('click', () => $('#skipModal').classList.remove('show'));
$('#btnConfirm').addEventListener('click', () => {
  skipToday(); $('#skipModal').classList.remove('show'); renderAll();
  showToast('✅ 已顺延，今天是 ' + CYCLE_NAMES[getTodayMuscle()]);
});
$('#skipModal').addEventListener('click', function(e) { if (e.target===this) this.classList.remove('show'); });

// ============================================================================
// 设置
// ============================================================================
function updateSettingsUI() { $('#startDateInput').value = getStartDate().toISOString().split('T')[0]; }
$('#saveStartDate').addEventListener('click', () => {
  const val = $('#startDateInput').value; if (!val) return;
  const d = new Date(val); if (isNaN(d)) return;
  saveStartDate(d); renderAll();
  showToast('✅ 起始日期已更新，计划重新对齐');
});
function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { $('#skipModal').classList.remove('show'); $$('.exercise-card.expanded').forEach(c => c.classList.remove('expanded')); }
});

updateSettingsUI();
renderAll();
console.log('🏋️ 新手健身追踪器 · 数据来源 MuscleWiki · 背→胸→肩→休息');
</script>
</body>
</html>
