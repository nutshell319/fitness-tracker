<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitnessTracker</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #121418; --bg-secondary:#17191e; --bg-card: #1e2127; --bg-card-hover: #262a32; --border: #2a2d36;
  --primary: #ff6b35; --primary-dim: rgba(255,107,53,0.10);
  --secondary: #4ecdc4; --secondary-dim: rgba(78,205,196,0.10);
  --text: #e4e2df; --text-primary:#e4e2df; --text-secondary: #a09d98; --text-muted: #6b6864; --danger: #e85d75;
  --back: #4ecdc4; --chest: #ff6b35; --shoulder: #f0c040;
  --abs: #22c55e; --abs-dim: rgba(34,197,94,0.10);
  --cardio: #60a5fa; --cardio-dim: rgba(96,165,250,0.10);
  --radius: 10px; --radius-sm: 6px;
  --font: "Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,-apple-system,sans-serif;
}
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #3a3d47; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #4a4d57; }
* { scrollbar-width: thin; scrollbar-color: #3a3d47 transparent; }

/* ── 全局过渡动画 ── */
@keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.02); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
@keyframes checkPop { 0% { transform: scale(0); } 60% { transform: scale(1.3); } 100% { transform: scale(1); } }

.header, .cycle-bar, .heatmap-section, .settings-section, .library-section { animation: fadeInUp 0.4s ease-out both; }
.heatmap-section { animation-delay: 0.05s; }
.cycle-bar { animation-delay: 0.1s; }
#todaySection, #cardioSection { animation: fadeInUp 0.4s ease-out 0.15s both; }
.library-section { animation: fadeInUp 0.4s ease-out 0.2s both; }
.settings-section { animation: fadeInUp 0.4s ease-out 0.25s both; }

.exercise-card { transition: border-color 0.2s, box-shadow 0.2s, margin 0.2s; }
.exercise-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.2); }
.card-arrow { transition: transform 0.3s cubic-bezier(.22,1,.36,1); }

.modal-overlay { transition: opacity 0.25s; }
.modal-overlay.show .modal-box { animation: slideDown 0.3s cubic-bezier(.22,1,.36,1); }

.toast { transition: opacity 0.3s, transform 0.3s cubic-bezier(.22,1,.36,1); }
.undo-bar { transition: transform 0.35s cubic-bezier(.22,1,.36,1); }

.exercise-check-item { transition: all 0.2s; }
.tag-btn { transition: all 0.25s; }
.skip-btn, .custom-plan-btn { transition: all 0.25s; }
.cycle-day { transition: all 0.25s; }
.heatmap-cell { transition: transform 0.15s, outline 0.15s; }

.exercise-done-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.exercise-done-check.checked { background: var(--abs); border-color: var(--abs); animation: checkPop 0.3s ease-out; }
.exercise-done-check.checked::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
.card-header .exercise-done-check { margin-right: 4px; }

.exercise-card.done { opacity: 0.6; }
.exercise-card.done .card-name { text-decoration: line-through; text-decoration-color: var(--abs); }

.progress-bar-wrap { background: var(--bg); border-radius: 4px; height: 4px; margin-bottom: 16px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: var(--abs); border-radius: 4px; transition: width 0.4s cubic-bezier(.22,1,.36,1); width: 0%; }

.search-box { width: 100%; padding: 10px 14px 10px 36px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 14px; font-family: var(--font); margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
.search-box:focus { border-color: var(--primary); }
.search-box-wrap { position: relative; }
.search-box-wrap::before { content: '🔍'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; z-index: 1; }

.app { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; }

.header { background: var(--bg-card); border-radius: var(--radius); padding: 28px 24px 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.header.back::before { background: var(--back); }
.header.chest::before { background: var(--chest); }
.header.shoulder::before { background: var(--shoulder); }
.header.abs::before { background: var(--abs); }
.header.cardio::before { background: var(--cardio); }
.day-emoji { font-size: 48px; display: block; margin-bottom: 6px; line-height: 1; }
.day-label { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 4px; }
.day-title { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
.header.back .day-title { color: var(--back); }
.header.chest .day-title { color: var(--chest); }
.header.shoulder .day-title { color: var(--shoulder); }
.header.abs .day-title { color: var(--abs); }
.header.cardio .day-title { color: var(--cardio); }
.motivation { font-size: 15px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.7; }
.today-date { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.header-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.skip-btn, .custom-plan-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: all 0.2s; }
.skip-btn:hover { border-color: var(--danger); color: var(--danger); }
.custom-plan-btn:hover { border-color: var(--primary); color: var(--primary); }

/* ── 打卡按钮 ── */
.checkin-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 32px; background: var(--primary); color: #fff; border: none; border-radius: 24px; cursor: pointer; font-size: 15px; font-weight: 700; font-family: var(--font); transition: all 0.25s; animation: pulse 2s infinite; position: relative; overflow: hidden; }
.checkin-btn:hover { opacity: 0.9; transform: scale(1.03); }
.checkin-btn:disabled { background: #3a3d47; color: var(--text-muted); cursor: not-allowed; animation: none; }
.checkin-btn:disabled:hover { opacity: 1; transform: none; }
.checkin-btn.checked { background: var(--abs); animation: none; }
.checkin-btn.checked::before { content: '✅ '; }
.checkin-btn .checkin-hint { font-size: 11px; font-weight: 400; opacity: 0.8; }

/* ── 微章墙 ── */
.badge-wall { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.badge-icon { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: default; transition: all 0.25s; position: relative; }
.badge-icon.earned { cursor: pointer; animation: badgeEarn 0.6s cubic-bezier(.22,1,.36,1); }
.badge-icon.earned:hover { transform: scale(1.2); }
.badge-icon.locked { opacity: 0.25; filter: grayscale(1); }
.badge-icon .badge-tooltip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #333; color: #fff; font-size: 11px; padding: 6px 10px; border-radius: 6px; white-space: nowrap; pointer-events: none; z-index: 10; }
.badge-icon.earned:hover .badge-tooltip { display: block; }

/* ── 里程碑弹窗 ── */
.badge-modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1001; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
.badge-modal.show { opacity: 1; pointer-events: auto; }
.badge-modal-content { text-align: center; animation: badgePopIn 0.5s cubic-bezier(.22,1,.36,1); }
.badge-modal-content .badge-big { font-size: 80px; display: block; animation: badgeSpin 0.8s cubic-bezier(.22,1,.36,1); }
.badge-modal-content .badge-name { font-size: 28px; font-weight: 700; margin: 12px 0 6px; }
.badge-modal-content .badge-desc { font-size: 15px; color: var(--text-secondary); margin-bottom: 20px; }
.badge-modal-content .badge-close { padding: 10px 28px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: var(--font); }
@keyframes badgePopIn { from { opacity: 0; transform: scale(0.3); } to { opacity: 1; transform: scale(1); } }
@keyframes badgeSpin { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }
@keyframes badgeEarn { 0% { transform: scale(0); } 60% { transform: scale(1.4); } 100% { transform: scale(1); } }

/* ── 庆祝动画覆盖层 ── */
.confetti-overlay { position: fixed; inset: 0; pointer-events: none; z-index: 1000; }

/* ── 分享预览弹窗 ── */
.share-preview-modal { position: fixed; inset: 0; padding: 16px; background: rgba(0,0,0,0.75); z-index: 10000; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease-out; }
.share-preview-content { width: min(960px, 100%); height: min(90vh, 900px); height: min(90dvh, 900px); display: grid; grid-template-rows: auto minmax(0, 1fr) auto; gap: 12px; overflow: hidden; background: var(--bg); border: 1px solid var(--border); border-radius: 16px; padding: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
.share-preview-header { min-width: 0; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.share-preview-header span { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 16px; font-weight: 700; color: var(--text-primary); }
.share-preview-close { flex-shrink: 0; background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.share-preview-close:hover { background: rgba(255,255,255,0.08); color: var(--text-primary); }
.share-preview-body { min-width: 0; min-height: 0; overflow: auto; display: flex; align-items: center; justify-content: center; background: var(--bg-secondary); border-radius: 8px; padding: 8px; }
.share-preview-img { display: block; max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
.share-preview-actions { display: grid; grid-template-columns: auto auto; gap: 10px; justify-content: end; }
.share-preview-btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-family: var(--font); cursor: pointer; border: none; transition: all 0.15s; }
.share-preview-btn.cancel { background: rgba(255,255,255,0.08); color: var(--text-secondary); }
.share-preview-btn.cancel:hover { background: rgba(255,255,255,0.14); }
.share-preview-btn.save { background: var(--primary); color: #fff; font-weight: 600; }
.share-preview-btn.save:hover { opacity: 0.9; }
@media (max-width: 480px) {
  .share-preview-modal { padding: 10px; }
  .share-preview-content { width: 100%; padding: 12px; }
  .share-preview-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .share-preview-btn { padding-left: 12px; padding-right: 12px; }
}
.streak-popup { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%) scale(0); z-index: 1001; pointer-events: none; transition: transform 0.5s cubic-bezier(.22,1,.36,1); }
.streak-popup.show { transform: translate(-50%,-50%) scale(1); }
.streak-popup .streak-num { font-size: 64px; font-weight: 900; text-align: center; line-height: 1; }
.streak-popup .streak-label { font-size: 18px; color: var(--text-secondary); text-align: center; margin-top: 4px; }
.encourage-text { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); z-index: 1001; pointer-events: none; font-size: 15px; color: var(--text-secondary); text-align: center; opacity: 0; transition: all 0.5s cubic-bezier(.22,1,.36,1); }
.encourage-text.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── 分享按钮组 ── */
.share-btn-group { display: flex; gap: 6px; justify-content: center; margin-top: 6px; flex-wrap: wrap; }
.share-btn-sm { padding: 4px 10px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 14px; cursor: pointer; font-size: 11px; font-family: var(--font); transition: all 0.2s; }
.share-btn-sm:hover { border-color: var(--primary); color: var(--primary); }

/* ── 统计数字新样式 ── */
.heatmap-stat .stat-num.record { color: #a78bfa; }

/* ── 周期栏打卡圆点 ── */
.cyc-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-left: 3px; vertical-align: middle; }
.cyc-dot.done { background: var(--abs); }
.cyc-dot.undone { background: var(--border); }
.cyc-dot.skipped-dot { background: var(--danger); }
.cyc-dot.cardio-dot { background: var(--cardio); }

.cycle-bar { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; border: 1px solid var(--border); }
.cycle-bar h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.cycle-days { display: flex; gap: 6px; justify-content: center; }
.cycle-day { flex: 1; max-width: 72px; text-align: center; padding: 10px 6px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid transparent; transition: all 0.2s; }
.cycle-day.today { border-color: var(--primary); background: var(--primary-dim); transform: scale(1.05); }
.cycle-day .cyc-date { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.cycle-day .cyc-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
.cycle-day .cyc-label { font-size: 11px; font-weight: 600; }
.cycle-day.back .cyc-label { color: var(--back); }
.cycle-day.chest .cyc-label { color: var(--chest); }
.cycle-day.shoulder .cyc-label { color: var(--shoulder); }
.cycle-day.abs .cyc-label { color: var(--abs); }
.cycle-day.cardio .cyc-label { color: var(--cardio); opacity: 0.7; }
.cycle-day.skipped { opacity: 0.35; text-decoration: line-through; }
.cycle-day.skipped .cyc-label { color: var(--danger); }

.heatmap-section { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px 14px; margin-bottom: 20px; border: 1px solid var(--border); }
.heatmap-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.heatmap-stat { text-align: center; }
.heatmap-stat .stat-num { font-size: 22px; font-weight: 700; }
.heatmap-stat .stat-num.train { color: var(--primary); }
.heatmap-stat .stat-num.skip { color: var(--danger); }
.heatmap-stat .stat-num.streak { color: var(--secondary); }
.heatmap-stat .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.heatmap-grid-wrap { overflow-x: auto; padding-bottom: 6px; }
.heatmap-grid-inner { display: inline-flex; flex-direction: column; min-width: 100%; }
.heatmap-month-row { display: flex; gap: 2px; margin-left: 24px; height: 18px; }
.heatmap-month-row .month-slot { width: 12px; flex-shrink: 0; position: relative; }
.heatmap-month-row .month-label { position: absolute; left: 0; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.heatmap-grid-body { display: flex; }
.heatmap-weekdays { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; margin-right: 4px; }
.heatmap-weekdays span { width: 20px; height: 12px; font-size: 9px; color: var(--text-muted); display: flex; align-items: center; justify-content: flex-end; }
.heatmap-grid { display: flex; gap: 2px; }
.heatmap-week-col { display: flex; flex-direction: column; gap: 2px; }
.heatmap-cell { width: 12px; height: 12px; border-radius: 2px; background: var(--bg); position: relative; cursor: default; flex-shrink: 0; outline: 1px solid rgba(255,255,255,0.04); outline-offset: -1px; }
.heatmap-cell:hover { outline: 1px solid rgba(255,255,255,0.4); z-index: 2; }
.heatmap-cell[data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); white-space: nowrap; background: #333; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 4px; pointer-events: none; z-index: 10; font-family: var(--font); }
.heatmap-cell.today-cell { outline: 2px solid #fff; outline-offset: -1px; z-index: 1; }
.heatmap-cell.clickable-cell { cursor: pointer; }
.heatmap-cell.empty { background: rgba(255,255,255,0.04); pointer-events: none; }
.heatmap-cell.future { background: rgba(255,255,255,0.04); pointer-events: none; }
.heatmap-cell.back-cell { background: var(--back); }
.heatmap-cell.chest-cell { background: var(--chest); }
.heatmap-cell.shoulder-cell { background: var(--shoulder); }
.heatmap-cell.abs-cell { background: var(--abs); }
.heatmap-cell.cardio-cell { background: var(--cardio); }
.heatmap-cell.skip-cell { background: rgba(232,93,117,0.35); }
.heatmap-legend { display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
.heatmap-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
.heatmap-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.exercise-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; cursor: pointer; }
.exercise-card:hover { border-color: #3a3d47; }
.exercise-card.expanded { border-color: var(--primary); }
.card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; user-select: none; }
.card-index { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-dim); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 16px; font-weight: 600; }
.card-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.card-badges { display: flex; gap: 6px; margin-top: 3px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-beginner { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-intermediate { background: rgba(240,192,64,0.15); color: #f0c040; }
.badge-advanced { background: rgba(232,93,117,0.15); color: #f8719e; }
.badge-weight { background: var(--primary-dim); color: var(--primary); }
.badge-bw { background: rgba(96,165,250,0.15); color: #93c5fd; }
.card-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.3s; flex-shrink: 0; }
.exercise-card.expanded .card-arrow { transform: rotate(180deg); }

.card-detail { max-height: 0; opacity: 0; overflow: hidden; padding: 0 18px; border-top: 1px solid transparent; transition: max-height 0.35s cubic-bezier(.22,1,.36,1), opacity 0.3s, padding 0.3s, border-color 0.3s; }
.exercise-card.expanded .card-detail { max-height: 2000px; opacity: 1; padding: 12px 18px 20px; border-top-color: var(--border); }

.params-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 13px; }
.params-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
.params-table tr:last-child { border-bottom: none; }
.params-table td { padding: 7px 6px; vertical-align: top; }
.params-table td:first-child { color: var(--text-muted); width: 90px; white-space: nowrap; font-weight: 600; font-size: 12px; }
.params-table td:last-child { color: var(--text-secondary); }
.params-table .val-highlight { color: var(--primary); font-weight: 600; }
.params-table .val-weight { color: var(--abs); font-weight: 600; }

.detail-section { margin-bottom: 14px; }
.detail-section h4 { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

.step-list { list-style: none; padding: 0; }
.step-list li { position: relative; padding-left: 24px; margin-bottom: 6px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.step-list li::before { content: attr(data-step); position: absolute; left: 0; top: 0; font-size: 11px; font-weight: 700; color: var(--primary); width: 18px; text-align: center; }

.mistake-list { list-style: none; padding: 0; }
.mistake-list li { position: relative; padding-left: 20px; margin-bottom: 5px; font-size: 14px; color: var(--danger); line-height: 1.6; }
.mistake-list li::before { content: '⚠'; position: absolute; left: 0; top: 0; font-size: 12px; }

.video-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.mw-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-dim); color: var(--primary); border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background 0.2s; }
.mw-link:hover { background: rgba(255,107,53,0.2); }

<script>
// 旧常量已迁移到 DEFAULT_CYCLE + getCycle() / getTodayCycleDay()，此处仅作兼容引用
function getCycleDayName(muscle) { const cd = getCycle().find(d => d.muscles.includes(muscle)); return cd ? cd.name : muscle; }
function getCycleDayNames() { const m={}; getCycle().forEach(d=>{d.muscles.forEach(mm=>{m[mm]=d.name;});}); return m; }
// 获取周期日的 cell 背景色：单色或渐变（多肌肉群）
function getDayBg(cd) {
  if (!cd) return '#333';
  const cs = cd.colors || [cd.color];
  if (cs.length <= 1) return cs[0];
  return 'linear-gradient(135deg,' + cs[0] + ' 50%,' + cs[1] + ' 50%)';
}
function getDayLabelColor(cd) {
  if (!cd) return '';
  const cs = cd.colors || [cd.color];
  return cs[0];
}
// 压缩图标显示：周期栏最多2个，header根据长度调字体
function compactEmoji(cd, max) {
  if (!cd) return '';
  const em = cd.emoji || '';
  if (!max || em.length <= max*2) return em;
  // 每个emoji通常是2个char（含variation selector），截取前max个
  return Array.from(em).slice(0, max).join('');
}

// 日期工具：全部使用本地时间，避免 UTC 时区偏差（中国 UTC+8）
function parseLocalDate(str) { const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); }
function formatLocalDate(d) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dt=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dt; }
function todayStr() { return formatLocalDate(new Date()); }

function getStartDate() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { const d = parseLocalDate(raw); if (!isNaN(d)) return d; }
  const today = new Date(); today.setHours(0,0,0,0); saveStartDateRaw(today); return today;
}

// 跳过的日期列表
function getSkipDates() {
  try { const raw = localStorage.getItem(SKIP_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
}
function isDateSkipped(dateStr) { return getSkipDates().includes(dateStr); }
function isTodaySkipped() { return isDateSkipped(todayStr()); }

// 有氧替换日期（计划变更：当天不做原计划，改为做有氧）
function getCardioDates() {
  try { const raw = localStorage.getItem(CARDIO_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
}
function isDateCardio(dateStr) { return getCardioDates().includes(dateStr); }
function isTodayCardio() { return isDateCardio(todayStr()); }

// 计算从起始日到今天之间，有多少个非跳过日（有效训练日）
function getDaysDiff() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipSet = new Set(getSkipDates());
  let count = 0;
  const d = new Date(start);
  while (d <= today) {
    if (!skipSet.has(formatLocalDate(d))) count++;
    d.setDate(d.getDate() + 1);
  }
  return count - 1; // 起始日当天 = 第 0 天
}

// 计算当前连续打卡天数（从今天往回数，遇到跳过日期停止）

// ── 统一统计引擎：从 localStorage 直读，所有分享卡片共用 ──
function computeStats(startDate, endDate) {
  const trainStart = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipRaw = localStorage.getItem('ft_skip_dates');
  const cardioRaw = localStorage.getItem('ft_cardio_dates');
  const skipArr = skipRaw ? JSON.parse(skipRaw) : [];
  const cardioArr = cardioRaw ? JSON.parse(cardioRaw) : [];
  let trainDays = 0, skipDays = 0, totalDays = 0;
  const muscleCount = {};
  const dailyStatus = [];
  const d = new Date(startDate);
  while (d <= endDate) {
    totalDays++;
    const ds = formatLocalDate(d);
    const isSkip = skipArr.includes(ds);
    const isCardio = cardioArr.includes(ds);
    if (d < trainStart) { dailyStatus.push({ds, type:'before'}); }
    else if (d > today) { dailyStatus.push({ds, type:'future'}); }
    else if (isSkip) { skipDays++; dailyStatus.push({ds, type:'skip'}); }
    else {
      trainDays++; dailyStatus.push({ds, type:isCardio?'cardio':'train'});
      if (isCardio) muscleCount['cardio'] = (muscleCount['cardio'] || 0) + 1;
      else { const cd = getCycleDayForDate(d); if (cd) for (const m of cd.muscles) muscleCount[m] = (muscleCount[m] || 0) + 1; }
    }
    d.setDate(d.getDate() + 1);
  }
  return { trainDays, skipDays, totalDays, muscleCount, dailyStatus };
}

function computeYearlyStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  const trainStart = getStartDate();
  const yearStart = new Date(today.getFullYear(), 0, 1);
  const skipRaw = localStorage.getItem('ft_skip_dates');
  const cardioRaw = localStorage.getItem('ft_cardio_dates');
  const skipArr = skipRaw ? JSON.parse(skipRaw) : [];
  const cardioArr = cardioRaw ? JSON.parse(cardioRaw) : [];
  let trainDays = 0, skipDays = 0, totalD = 0;
  let currentStreak = 0, longestStreak = 0;
  const muscleCount = {};
  const monthDays = new Array(12).fill(0);
  const monthWeeks = Array.from({length: 12}, () => []);
  let bestMonth = 0, bestMonthDays = 0;
  const d = new Date(yearStart);
  while (d <= today) {
    // 逐日累加而不是使用毫秒差，避免夏令时切换导致年度天数多算或少算一天。
    totalD++;
    const ds = formatLocalDate(d);
    const mIdx = d.getMonth();
    const month1st = new Date(d.getFullYear(), mIdx, 1);
    const weekIdx = Math.floor((d.getDate() + month1st.getDay() - 1) / 7);
    if (!monthWeeks[mIdx][weekIdx]) monthWeeks[mIdx][weekIdx] = 0;
    if (d < trainStart) {
      currentStreak = 0;
      d.setDate(d.getDate() + 1);
      continue;
    } // 训练开始前不应计入当年连续训练。
    const isSkip = skipArr.includes(ds);
    const isCardio = cardioArr.includes(ds);
    if (isSkip) { skipDays++; currentStreak = 0; }
    else {
      trainDays++; monthDays[mIdx]++; monthWeeks[mIdx][weekIdx]++;
      currentStreak++;
      if (currentStreak > longestStreak) longestStreak = currentStreak;
      if (monthDays[mIdx] > bestMonthDays) { bestMonthDays = monthDays[mIdx]; bestMonth = mIdx; }
      if (isCardio) muscleCount['cardio'] = (muscleCount['cardio'] || 0) + 1;
      else { const cd = getCycleDayForDate(d); if (cd) for (const m of cd.muscles) muscleCount[m] = (muscleCount[m] || 0) + 1; }
    }
    d.setDate(d.getDate() + 1);
  }
  return { trainDays, skipDays, totalD, longestStreak, muscleCount, monthDays, monthWeeks, bestMonth, bestMonthDays };
}
function getCurrentStreak() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipArr=JSON.parse(localStorage.getItem('ft_skip_dates')||'[]');
  const cardioArr=JSON.parse(localStorage.getItem('ft_cardio_dates')||'[]');
  let streak = 0;
  const check = new Date(today);
  while (check >= start) {
    const ds = formatLocalDate(check);
    if (skipArr.includes(ds)) break; // 只有跳过才断连续
    streak++;
    check.setDate(check.getDate() - 1);
  }
  return streak;
}

function getLongestStreak() {
  try { const v = localStorage.getItem(LONGEST_STREAK_KEY); return v ? parseInt(v,10) : 0; } catch(e) { return 0; }
}

function updateLongestStreak(streak) {
  const current = getLongestStreak();
  if (streak > current) localStorage.setItem(LONGEST_STREAK_KEY, String(streak));
}

function getEarnedBadges() {
  try { const raw = localStorage.getItem(BADGES_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
}

function earnBadge(badge) {
  const earned = getEarnedBadges();
  if (earned.find(b => b.id === badge.id)) return null; // 已有
  const record = {id:badge.id, name:badge.name, icon:badge.icon, unlockedAt:todayStr(), streakAt:getCurrentStreak()};
  earned.push(record);
  localStorage.setItem(BADGES_KEY, JSON.stringify(earned));
  return record;
}

// 检测是否达到新里程碑，返回新解锁的徽章
function checkNewBadges(streak) {
  const earned = getEarnedBadges();
  const newBadges = [];
  for (const b of BADGES) {
    if (streak >= b.days && !earned.find(e => e.id === b.id)) {
      const record = earnBadge(b);
      if (record) newBadges.push(b);
    }
  }
  return newBadges;
}

// ── 庆祝动画 ──
let confettiParticles = [];
let confettiAnimId = null;

function launchConfetti() {
  const canvas = document.getElementById('confettiCanvas');
  if (!canvas) return;
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  // 生成粒子
  const colors = ['#ff6b35','#4ecdc4','#f0c040','#22c55e','#a78bfa','#f472b6','#60a5fa','#e85d75','#fff'];
  confettiParticles = [];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight * 0.35;
  for (let i = 0; i < 80; i++) {
    confettiParticles.push({
      x: cx + (Math.random() - 0.5) * 160,
      y: cy + (Math.random() - 0.5) * 60,
      vx: (Math.random() - 0.5) * 12,
      vy: Math.random() * -10 - 4,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 6,
      color: colors[Math.floor(Math.random() * colors.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3,
      opacity: 1,
      gravity: 0.15 + Math.random() * 0.15,
    });
  }

  let frame = 0;
  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = 0;
    for (const p of confettiParticles) {
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      p.rotation += p.rotSpeed;
      if (frame > 20) p.opacity -= 0.02;
      if (p.opacity <= 0) continue;
      alive++;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.opacity);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    }
    frame++;
    if (alive > 0 && frame < 80) {
      confettiAnimId = requestAnimationFrame(animate);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      confettiAnimId = null;
    }
  }
  if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
  confettiAnimId = requestAnimationFrame(animate);
}

function showStreakPopup(streak, isMilestone, badgeColor) {
  const popup = document.getElementById('streakPopup');
  const numEl = document.getElementById('streakNum');
  const labelEl = document.getElementById('streakLabel');
  if (!popup || !numEl || !labelEl) return;

  popup.classList.remove('show');
  numEl.style.color = badgeColor || '#ff6b35';
  numEl.style.opacity = '0';
  numEl.style.transform = 'scale(0)';

  // 数字滚动效果
  let current = 0;
  const target = streak;
  const duration = 800;
  const startTime = performance.now();

  function tick(ts) {
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / duration, 1);
    // easeOutBack
    const c1 = 1.70158, c3 = c1 + 1;
    const val = 1 + c3 * Math.pow(progress - 1, 3) + c1 * Math.pow(progress - 1, 2);
    current = Math.round(target * val);
    if (current > target) current = target;
    numEl.textContent = '🔥 ' + current + ' 天连续！';
    if (progress < 1) {
      requestAnimationFrame(tick);
    } else {
      numEl.textContent = '🔥 ' + target + ' 天连续！';
    }
  }

  void numEl.offsetWidth; // force reflow
  popup.classList.add('show');
  numEl.style.opacity = '1';
  numEl.style.transform = 'scale(1)';
  numEl.style.transition = 'transform 0.5s cubic-bezier(.22,1,.36,1), opacity 0.3s';
  requestAnimationFrame(tick);

  // 如果是第一天
  if (streak <= 1) {
    numEl.textContent = '👊 重新出发！';
    labelEl.textContent = '今天就是最好的开始';
  } else {
    labelEl.textContent = isMilestone ? '🏅 解锁新成就！' : getNextBadge(streak) ? '还差 ' + (getNextBadge(streak).days - streak) + ' 天解锁 ' + getNextBadge(streak).icon : '';
  }

  // 自动隐藏
  setTimeout(() => { popup.classList.remove('show'); }, 2500);
}

function showEncourageText(streak, isMilestone) {

// 根据动作完成情况更新打卡按钮状态
function updateCheckinBtnState(doneCount, totalCount) {
  const btn = $('#checkinBtn');
  const hint = $('#checkinHint');
  if (!btn) return;
  if (isTodayCheckedIn()) return; // 已打卡不处理
  if (doneCount > 0 || totalCount > 0) {
    btn.disabled = false;
    btn.style.animation = 'pulse 2s infinite';
    if (hint) hint.style.display = 'none';
  } else {
    btn.disabled = true;
    btn.style.animation = 'none';
    if (hint) hint.style.display = '';
  }
}

function performCheckin() {
  const ds = todayStr();
  const checkinKey = CHECKIN_KEY_PREFIX + ds;
  const doneKey = DONE_KEY_PREFIX + ds;

  if (isTodayCheckedIn()) {
    // 取消打卡：删除打卡记录 + 清空全部勾选
    localStorage.removeItem(checkinKey);
    localStorage.removeItem(doneKey);
    const cd = getTodayCycleDay();
    renderHeader(cd ? cd.muscles[0] : 'back');
    renderHeatmap();
    renderCycleBar();
    renderTodayWorkout(getTodayCycleDayIndex());
    showToast('已取消今日打卡');
    return;
  }

  // 打卡：记录打卡时间
  localStorage.setItem(checkinKey, String(Date.now()));

  // 一键全勾选：有氧替换日勾有氧动作，否则勾今日计划动作
  const exs = isDateCardio(ds)
    ? getEffectivePlan('cardio').map(id => EXERCISES.find(e => e.id === id)).filter(Boolean)
    : getTodayExercises();
  if (exs.length > 0) {
    const allIds = exs.map(e => e.id);
    localStorage.setItem(doneKey, JSON.stringify(allIds));
  }

  // 更新最长连续纪录（打卡后的连续天数）
  const streak = getCurrentStreak();
  updateLongestStreak(streak);

  // 检测里程碑
  const newBadges = checkNewBadges(streak);
  const isMilestone = newBadges.length > 0;

  // 更新 UI
  const cd = getTodayCycleDay();
  renderHeader(cd ? cd.muscles[0] : 'back');
  renderHeatmap();
  renderCycleBar();
  renderTodayWorkout(getTodayCycleDayIndex());

  // 庆祝动画
  launchConfetti();
  const badgeColor = isMilestone ? newBadges[0].color : '#ff6b35';
  setTimeout(() => showStreakPopup(streak, isMilestone, badgeColor), 300);
  setTimeout(() => showEncourageText(streak, isMilestone), 1000);

  // 里程碑弹窗
  if (isMilestone) {
    setTimeout(() => showBadgeModal(newBadges[0]), 1800);
  }

  // 打卡后引导分享日签
  setTimeout(() => {
    showToast('📸 点击"日签"按钮，分享今天的训练成果！');
  }, 3500);
}

  const earned = getEarnedBadges();
  const streak = getCurrentStreak();
  let h = '<div class="badge-wall">';
  for (const b of BADGES) {
    const record = earned.find(e => e.id === b.id);
    const earned_ = !!record;
    h += '<div class="badge-icon ' + (earned_ ? 'earned' : 'locked') + '"';
    if (earned_) {
      h += ' onclick="showBadgeDetail(\'' + b.id + '\')"';
      h += '><span>' + b.icon + '</span>';
      h += '<span class="badge-tooltip">' + b.name + '<br>' + record.unlockedAt + ' 解锁</span>';
    } else {
      h += '><span style="font-size:20px;">' + b.icon + '</span>';
      h += '<span class="badge-tooltip">' + b.name + '<br>连续 ' + b.days + ' 天解锁</span>';
    }
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function clearUndo() {
  lastUndo = null;
  $('#undoBar').classList.remove('show');
}
function performUndo() {
  if (!lastUndo) return;
  lastUndo.undo();
  const label = lastUndo.label;
  clearUndo();
  renderAll();
  showToast('↩ 已撤销：' + label);
}

function saveStartDate(d) {
  const old = localStorage.getItem(STORAGE_KEY);
  snapshotUndo(() => { if (old) localStorage.setItem(STORAGE_KEY, old); else localStorage.removeItem(STORAGE_KEY); }, '修改起始日期');
  localStorage.setItem(STORAGE_KEY, formatLocalDate(d));
}
function saveStartDateRaw(d) { localStorage.setItem(STORAGE_KEY, formatLocalDate(d)); }

// 跳过今天：将今天加入跳过列表，不影响起始日
function skipToday() {
  if (isTodaySkipped()) return;
  const ts = todayStr();
  const oldSkips = getSkipDates();
  snapshotUndo(() => { localStorage.setItem(SKIP_KEY, JSON.stringify(oldSkips)); }, '跳过今天');
  const newSkips = [...oldSkips, ts];
  localStorage.setItem(SKIP_KEY, JSON.stringify(newSkips));
}

function getCustomPlan(muscle) {
  try {
    const raw = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length > 0) return arr; }
  } catch(e) {}
  return null;
}
function saveCustomPlan(muscle, ids) {
  const old = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
  snapshotUndo(() => { if (old) localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, old); else localStorage.removeItem(CUSTOM_PLAN_PREFIX + muscle); }, '自定义' + getCycleDayName(muscle) + '计划');
  localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, JSON.stringify(ids));
}
function resetCustomPlan(muscle) {
  const old = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
  snapshotUndo(() => { if (old) localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, old); }, '恢复默认' + getCycleDayName(muscle) + '计划');
  localStorage.removeItem(CUSTOM_PLAN_PREFIX + muscle);
}
function getEffectivePlan(muscle) {
  return getCustomPlan(muscle) || EXERCISES.filter(e => e.muscle === muscle && e.core).map(e => e.id);
}

];
const CYCLE_STORAGE_KEY = 'ft_cycle_config';

function getCycle() {
  try {
    const raw = localStorage.getItem(CYCLE_STORAGE_KEY);
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length > 0) return arr; }
  } catch(e) {}
  return DEFAULT_CYCLE;
}
function getCycleLength() { return getCycle().length; }

// 计算某一天对应的周期日索引（0-based），跳过日返回 -1
function getCycleDayIndexForDate(date) {
  const ds = formatLocalDate(date);
  if (isDateSkipped(ds)) return -1;
  const start = getStartDate();
  const skipSet = new Set(getSkipDates());
  const cardioSet = new Set(getCardioDates()); // 有氧替换日也顺延计划
  let count = 0;
  const d = new Date(start);
  while (d <= date) {
    const cds = formatLocalDate(d);
    if (!skipSet.has(cds) && !cardioSet.has(cds)) count++;
    d.setDate(d.getDate() + 1);
  }
  const idx = count - 1;
  return ((idx % getCycleLength()) + getCycleLength()) % getCycleLength();
}

function getTodayCycleDayIndex() { return getCycleDayIndexForDate(new Date()); }

// 获取今天的周期日对象（跳过返回 null）
function getTodayCycleDay() {
  const idx = getTodayCycleDayIndex();
  if (idx < 0) return null;
  return getCycle()[idx];
}

// 兼容旧代码：返回今天的主肌肉群（多肌肉天返回第一个）
function getTodayMuscle() {
  if (isTodaySkipped()) return 'skipped';
  const cd = getTodayCycleDay();
  return cd ? (cd.muscles[0] || 'back') : 'skipped';
}

// 兼容旧代码：返回某天的训练部位字符串（用于热力图）
function getMuscleForDate(date) {
  const idx = getCycleDayIndexForDate(date);
  if (idx < 0) return 'skipped';
  const cd = getCycle()[idx];
  return cd.muscles[0] || 'back';
}

// 获取某天的周期日对象
function getCycleDayForDate(date) {
  const idx = getCycleDayIndexForDate(date);
  if (idx < 0) return null;
  return getCycle()[idx];
}

// 获取某周期的有效训练计划：合并所有肌肉群的核心动作
function getEffectivePlan(dayIndex) {
  if (dayIndex < 0) return [];
  const cd = getCycle()[dayIndex];
  if (!cd) return [];
  // 先查该天是否有自定义计划（按天索引存）
  const customDay = getCustomPlan('day_' + dayIndex);
  if (customDay) return customDay;
  // 再查旧格式（按第一个肌肉群存，兼容旧数据）
  const legacyPlan = getCustomPlan(cd.muscles[0]);
  if (legacyPlan) return legacyPlan;
  // 默认：合并所有肌肉群中 core:true 的动作
  const ids = [];
  for (const m of cd.muscles) {
    EXERCISES.filter(e => e.muscle === m && e.core).forEach(e => { if (!ids.includes(e.id)) ids.push(e.id); });
  }
  return ids.length > 0 ? ids : EXERCISES.filter(e => cd.muscles.includes(e.muscle)).slice(0, 5).map(e => e.id);
}

// 获取今日训练动作列表（含当天是否有训练的判断）
function getTodayExercises() {
  const idx = getTodayCycleDayIndex();
  if (idx < 0) return [];
  return getEffectivePlan(idx).map(id => EXERCISES.find(e => e.id === id)).filter(Boolean);
}

  monthly: Object.freeze({ width: 1600, height: 900, padding: 72, header: 126, footer: 72, minFont: 22 }),
  heatmap: Object.freeze({ width: 1600, height: 900, padding: 72, header: 154, footer: 92, minFont: 20 })
});

/**
 * 获取指定分享类型的基础尺寸。返回副本可防止调用方修改共享的格式定义。
 * @param {string} type 分享卡片类型。
 * @returns {{type:string,width:number,height:number,padding:number,header:number,footer:number,minFont:number}} 格式副本。
 */
function getShareFormat(type) {
  if (!Object.prototype.hasOwnProperty.call(SHARE_FORMATS, type)) {
    throw new Error(`未知分享图类型: ${type}`);
  }
  const format = SHARE_FORMATS[type];
  return { ...format, type };
}

/**
 * 将卡片严格切分为标题、正文和页脚区域。正文的上下边界直接接触标题和页脚，绘制代码无需再猜测可用高度。
 * @param {string} type 分享卡片类型。
 * @returns {{format:object,inner:object,header:object,body:object,footer:object}} 各安全区域矩形。
 */
function createShareLayout(type) {
  const format = getShareFormat(type);
  const inner = {
    x: format.padding,
    y: format.padding,
    width: format.width - format.padding * 2,
    height: format.height - format.padding * 2
  };
  const header = { x: inner.x, y: inner.y, width: inner.width, height: format.header };
  const footer = {
    x: inner.x,
    y: inner.y + inner.height - format.footer,
    width: inner.width,
    height: format.footer
  };
  const body = {
    x: inner.x,
    y: header.y + header.height,
    width: inner.width,
    height: footer.y - (header.y + header.height)
  };
  return { format, inner, header, body, footer };
}

/**
 * 对超宽文字追加省略号。先保留可测量的前缀，确保 Canvas 绘制结果永远不越过给定宽度。
 * @param {(text:string) => number} measureText 文字宽度测量函数。
 * @param {*} text 待显示文本。
 * @param {number} maxWidth 最大允许宽度。
 * @returns {string} 可安全绘制的原文或省略文本。
 */
function ellipsizeText(measureText, text, maxWidth) {
  const value = String(text == null ? '' : text);
  const width = Math.max(0, Number(maxWidth) || 0);
  if (measureText(value) <= width) return value;

  const ellipsis = '…';
  if (measureText(ellipsis) > width) return '';

  let prefix = value;
  while (prefix && measureText(prefix + ellipsis) > width) prefix = prefix.slice(0, -1);
  return prefix + ellipsis;
}

/**
 * 逐字符折行，使用索引推进而非 indexOf，因此重复字符不会导致后续文本被重新定位或遗漏。
 * @param {(text:string) => number} measureText 文字宽度测量函数。
 * @param {*} text 待折行文本。
 * @param {number} maxWidth 单行最大宽度。
 * @param {number} maxLines 最大行数。
 * @returns {{lines:string[],truncated:boolean}} 折行结果及是否发生截断。
 */
function wrapText(measureText, text, maxWidth, maxLines) {
  const value = String(text == null ? '' : text).trim();
  const width = Math.max(0, Number(maxWidth) || 0);
  const lineLimit = Math.max(1, Math.floor(Number(maxLines) || 1));
  const lines = [];
  let index = 0;

  while (index < value.length && lines.length < lineLimit) {
    let line = '';
    while (index < value.length) {
      const candidate = line + value[index];
      if (line && measureText(candidate) > width) break;

      if (!line && measureText(candidate) > width) {
        // 单个字符已超过宽度时也必须推进索引，避免零宽或极窄区域陷入死循环。
        line = ellipsizeText(measureText, candidate, width);
        index += 1;
        break;
      }

      line = candidate;
      index += 1;
    }
    lines.push(line);
  }

  const truncated = index < value.length;
  if (truncated && lines.length) {
    lines[lines.length - 1] = ellipsizeText(measureText, lines[lines.length - 1] + value.slice(index), width);
  }
  return { lines, truncated };
}

/**
 * 在一行内创建等宽指标卡片，间隙与高度均会压缩到边界内，防止导出尺寸变化时横向溢出。
 * @param {{x:number,y:number,width:number,height:number}} bounds 正文安全区域。
 * @param {number} columns 列数。
 * @param {number} gap 期望列间距。
 * @param {number} height 期望卡片高度。
 * @returns {Array<{x:number,y:number,width:number,height:number}>} 等宽矩形列表。
 */
function createMetricGrid(bounds, columns, gap, height) {
  const columnCount = Math.max(1, Math.floor(Number(columns) || 1));
  const availableWidth = Math.max(0, Number(bounds.width) || 0);
  const availableHeight = Math.max(0, Number(bounds.height) || 0);
  const desiredGap = Math.max(0, Number(gap) || 0);
  const maxGap = columnCount > 1 ? availableWidth / (columnCount - 1) : 0;
  const actualGap = Math.min(desiredGap, maxGap);
  const itemWidth = (availableWidth - actualGap * (columnCount - 1)) / columnCount;
  const itemHeight = Math.min(Math.max(0, Number(height) || 0), availableHeight);
  const items = [];

  for (let index = 0; index < columnCount; index += 1) {
    items.push({
      x: (Number(bounds.x) || 0) + index * (itemWidth + actualGap),
      y: Number(bounds.y) || 0,
      width: itemWidth,
      height: itemHeight
    });
  }
  return items;
}

/**
 * 根据可用宽高反推热力图正方形单元格。优先保留期望间隙，空间不足时缩小间隙以保证整数单元格完全落入边界。
 * @param {{width:number,height:number}} bounds 热力图安全区域。
 * @param {number} columns 热力图列数。
 * @param {number} rows 热力图行数。
 * @param {number} preferredGap 期望单元格间隙。
 * @returns {{cell:number,gap:number,width:number,height:number}} 可绘制网格参数。
 */
function fitHeatmapGrid(bounds, columns, rows, preferredGap) {
  const columnCount = Math.max(1, Math.floor(Number(columns) || 1));
  const rowCount = Math.max(1, Math.floor(Number(rows) || 1));
  const availableWidth = Math.max(0, Number(bounds.width) || 0);
  const availableHeight = Math.max(0, Number(bounds.height) || 0);
  const desiredGap = Math.max(0, Number(preferredGap) || 0);
  const widthGapLimit = columnCount > 1 ? (availableWidth - columnCount) / (columnCount - 1) : desiredGap;
  const heightGapLimit = rowCount > 1 ? (availableHeight - rowCount) / (rowCount - 1) : desiredGap;
  let gap = Math.max(0, Math.min(desiredGap, widthGapLimit, heightGapLimit));
  let cell = Math.floor(Math.min(
    (availableWidth - gap * (columnCount - 1)) / columnCount,
    (availableHeight - gap * (rowCount - 1)) / rowCount
  ));

  if (cell < 1) {
    gap = 0;
    cell = Math.floor(Math.min(availableWidth / columnCount, availableHeight / rowCount));
  }
  if (cell < 1) throw new RangeError('Heatmap bounds are too small for one cell');

  return {
    cell,
    gap,
    width: cell * columnCount + gap * (columnCount - 1),
    height: cell * rowCount + gap * (rowCount - 1)
  };
}

/**
 * 按训练次数排序并规划排行行数；超出安全高度的条目合并为“其他”，以保证卡片内容永不压到页脚。
 * @param {Array<[string,number]>} entries 部位及次数列表。
 * @param {number} availableHeight 排行可用高度。
 * @param {number} rowHeight 单行高度。
 * @returns {Array<[string,number]> & {hiddenCount?:number}} 可直接绘制的排行条目；不足一整行时返回带 hiddenCount 的空数组。
 */
function planRankedItems(entries, availableHeight, rowHeight, reservedHeight = 0) {
  const safeRowHeight = Math.max(1, Number(rowHeight) || 1);
  const usableHeight = Math.max(0, (Number(availableHeight) || 0) - Math.max(0, Number(reservedHeight) || 0));
  const maxRows = Math.floor(usableHeight / safeRowHeight);
  const ranked = (Array.isArray(entries) ? entries : []).map((entry, index) => [
    entry[0],
    Number(entry[1]) || 0,
    index
  ]).sort((left, right) => right[1] - left[1] || left[2] - right[2]);

  if (!ranked.length) return [];
  if (maxRows <= 0) {
    // 不足一行时不能绘制聚合行，否则会侵入页脚安全区；隐藏数量供调用方决定是否显示占位提示。
    const emptyPlan = [];
    Object.defineProperty(emptyPlan, 'hiddenCount', { value: ranked.length, enumerable: false });
    return emptyPlan;
  }
  const total = ranked.reduce((sum, entry) => sum + entry[1], 0);
  if (maxRows === 1) {
    const singlePlan = [['其他', total]];
    Object.defineProperty(singlePlan, 'hiddenCount', { value: ranked.length, enumerable: false });
    return singlePlan;
  }
  if (ranked.length <= maxRows) return ranked.map(entry => [entry[0], entry[1]]);

  const visible = ranked.slice(0, maxRows - 1).map(entry => [entry[0], entry[1]]);
  const hiddenTotal = ranked.slice(maxRows - 1).reduce((sum, entry) => sum + entry[1], 0);
  visible.push(['其他', hiddenTotal]);
  Object.defineProperty(visible, 'hiddenCount', { value: ranked.length - (maxRows - 1), enumerable: false });
  return visible;
}

/**
 * 为旧版 Canvas 提供圆角路径回退。现代浏览器走 roundRect，兼容路径只追加到当前路径，由调用方决定何时 beginPath/stroke。
 * @param {CanvasRenderingContext2D} ctx Canvas 上下文。
 * @param {number} x 矩形左上角横坐标。
 * @param {number} y 矩形左上角纵坐标。
 * @param {number} width 矩形宽度。
 * @param {number} height 矩形高度。
 * @param {number} radius 圆角半径。
 */
function roundedRect(ctx, x, y, width, height, radius) {
  const safeRadius = Math.max(0, Math.min(Number(radius) || 0, Math.abs(width) / 2, Math.abs(height) / 2));
  if (typeof ctx.roundRect === 'function') {
    ctx.roundRect(x, y, width, height, safeRadius);
    return;
  }

  const right = x + width;
  const bottom = y + height;
  ctx.moveTo(x + safeRadius, y);
  ctx.lineTo(right - safeRadius, y);
  ctx.quadraticCurveTo(right, y, right, y + safeRadius);
  ctx.lineTo(right, bottom - safeRadius);
  ctx.quadraticCurveTo(right, bottom, right - safeRadius, bottom);
  ctx.lineTo(x + safeRadius, bottom);
  ctx.quadraticCurveTo(x, bottom, x, bottom - safeRadius);
  ctx.lineTo(x, y + safeRadius);
  ctx.quadraticCurveTo(x, y, x + safeRadius, y);
}

/**
 * 按分享类型创建固定尺寸画布，并统一绘制深色背景与圆角外框。
 * 所有分享卡均从同一布局引擎取得安全区域，避免内容依据数据量改变画布高度。
 * @param {string} type 分享卡类型。
 * @returns {{canvas:HTMLCanvasElement,ctx:CanvasRenderingContext2D,layout:object}} 画布、上下文和安全布局。
 */
function drawShareCanvas(type) {
  const layout = createShareLayout(type);
  const canvas = document.createElement('canvas');
  canvas.width = layout.format.width;
  canvas.height = layout.format.height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#1e2127';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#2a2d36';
  ctx.lineWidth = 3;
  ctx.beginPath();
  roundedRect(ctx, 18, 18, canvas.width - 36, canvas.height - 36, 28);
  ctx.stroke();
  return { canvas, ctx, layout };
}

/**
 * 在给定安全区域内绘制等宽指标卡片。
 * 指标卡的列宽由 createMetricGrid 计算，保证不同画布宽度下不会溢出正文区域。
 * @param {CanvasRenderingContext2D} ctx Canvas 上下文。
 * @param {{x:number,y:number,width:number,height:number}} bounds 指标区域。
 * @param {Array<{num:number|string,label:string,color:string}>} metrics 指标数据。
 */
function drawMetricCards(ctx, bounds, metrics) {
  const cards = createMetricGrid(bounds, Math.max(1, metrics.length), 24, bounds.height);
  for (let index = 0; index < metrics.length; index += 1) {
    const metric = metrics[index];
    const card = cards[index];
    ctx.fillStyle = '#121418';
    ctx.beginPath();
    roundedRect(ctx, card.x, card.y, card.width, card.height, 16);
    ctx.fill();
    ctx.textAlign = 'center';
    ctx.fillStyle = metric.color;
    ctx.font = 'bold 38px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(String(metric.num), card.x + card.width / 2, card.y + card.height * 0.48);
    ctx.fillStyle = '#a09d98';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    const label = ellipsizeText(text => ctx.measureText(text).width, metric.label, card.width - 24);
    ctx.fillText(label, card.x + card.width / 2, card.y + card.height * 0.78);
  }
}

function shareCheckinCard() {
  const { canvas, ctx, layout } = drawShareCanvas('daily');
  const today = new Date();
  const cycleDay = getTodayCycleDay();
  const exercises = getTodayExercises();
  const completedCount = exercises.filter(exercise => isDone(exercise.id)).length;
  const streak = isTodayCheckedIn() ? getCurrentStreak() : 0;
  const dayColor = cycleDay ? (cycleDay.colors?.[0] || cycleDay.color || '#ff6b35') : '#ff6b35';
  const measure = text => ctx.measureText(text).width;
  const width = canvas.width;

  const glow = ctx.createRadialGradient(width / 2, layout.header.y + 62, 12, width / 2, layout.header.y + 62, 260);
  glow.addColorStop(0, dayColor + '33');
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
  const dateText = `${today.getFullYear()}年${today.getMonth() + 1}月${today.getDate()}日 星期${weekDays[today.getDay()]}`;
  ctx.textAlign = 'center';
  ctx.font = '52px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(cycleDay ? cycleDay.emoji : '🏋️', width / 2, layout.header.y + 62);
  ctx.fillStyle = dayColor;
  ctx.font = 'bold 34px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(ellipsizeText(measure, cycleDay ? cycleDay.name : '训练日', layout.header.width - 80), width / 2, layout.header.y + 118);
  ctx.fillStyle = '#e4e2df';
  ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(dateText, width / 2, layout.header.y + 158);
  ctx.fillStyle = '#ff6b35';
  ctx.font = 'bold 42px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`🔥 ${streak} 天连续`, width / 2, layout.header.y + 218);

  const motivationBounds = { x: layout.body.x, y: layout.body.y + 20, width: layout.body.width, height: 132 };
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.beginPath();
  roundedRect(ctx, motivationBounds.x, motivationBounds.y, motivationBounds.width, motivationBounds.height, 18);
  ctx.fill();
  ctx.strokeStyle = '#2a2d36';
  ctx.lineWidth = 2;
  ctx.beginPath();
  roundedRect(ctx, motivationBounds.x, motivationBounds.y, motivationBounds.width, motivationBounds.height, 18);
  ctx.stroke();
  const motivation = cycleDay && cycleDay.motivation ? cycleDay.motivation : '坚持就是胜利！';
  ctx.fillStyle = '#c0bbb4';
  ctx.font = '25px "Microsoft YaHei","PingFang SC",sans-serif';
  const motivationLines = wrapText(measure, `“${motivation}”`, motivationBounds.width - 72, 2).lines;
  motivationLines.forEach((line, index) => ctx.fillText(line, width / 2, motivationBounds.y + 49 + index * 36));

  const progressY = layout.body.y + 202;
  const completion = exercises.length ? completedCount / exercises.length : 0;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#e4e2df';
  ctx.font = 'bold 28px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`今日动作 ${completedCount}/${exercises.length}`, layout.body.x, progressY);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`${Math.round(completion * 100)}%`, layout.body.x + layout.body.width, progressY);
  const progressBarY = progressY + 22;
  ctx.fillStyle = '#121418';
  ctx.beginPath();
  roundedRect(ctx, layout.body.x, progressBarY, layout.body.width, 14, 7);
  ctx.fill();
  if (completion > 0) {
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    roundedRect(ctx, layout.body.x, progressBarY, Math.max(14, layout.body.width * completion), 14, 7);
    ctx.fill();
  }

  const actionRowHeight = 52;
  const actionListY = layout.body.y + 292;
  const actionBounds = { x: layout.body.x, y: actionListY, width: layout.body.width, height: layout.footer.y - actionListY };
  const plannedActions = planRankedItems(
    exercises.map((exercise, index) => [String(index), exercises.length - index]),
    actionBounds.height,
    actionRowHeight,
    54
  );
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('今日计划', actionBounds.x, actionBounds.y - 18);
  if (!plannedActions.length && !exercises.length) {
    ctx.fillStyle = '#6b6864';
    ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText('今天还没有安排动作', actionBounds.x, actionBounds.y + 34);
  }
  plannedActions.forEach(([actionIndex], rowIndex) => {
    const y = actionBounds.y + rowIndex * actionRowHeight;
    const isOverflow = actionIndex === '其他';
    const exercise = isOverflow ? null : exercises[Number(actionIndex)];
    const done = Boolean(exercise && isDone(exercise.id));
    ctx.font = '28px "Microsoft YaHei","PingFang SC",sans-serif';
    const label = isOverflow
      ? `另 ${plannedActions.hiddenCount || 0} 项动作`
      : ellipsizeText(measure, exercise ? exercise.name : '未命名动作', actionBounds.width - 70);
    ctx.fillStyle = done ? '#22c55e' : '#6b6864';
    ctx.font = '28px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(done ? '✓' : '○', actionBounds.x, y + 32);
    ctx.fillStyle = isOverflow ? '#a09d98' : (done ? '#e4e2df' : '#c0bbb4');
    ctx.fillText(label, actionBounds.x + 42, y + 32);
  });

  ctx.textAlign = 'center';
  ctx.strokeStyle = '#2a2d36';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(layout.footer.x, layout.footer.y + 8);
  ctx.lineTo(layout.footer.x + layout.footer.width, layout.footer.y + 8);
  ctx.stroke();
  const dotColors = cycleDay && cycleDay.colors && cycleDay.colors.length > 1 ? cycleDay.colors : [dayColor];
  dotColors.slice(0, 5).forEach((color, index) => {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(width / 2 - (Math.min(dotColors.length, 5) - 1) * 10 + index * 20, layout.footer.y + 38, 6, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = '#a09d98';
  ctx.font = '20px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('每日打卡 · 成就更好的自己', width / 2, layout.footer.y + 68);
  ctx.fillStyle = '#6b6864';
  ctx.font = '17px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('FitnessTracker · github.com/nutshell319/fitness-tracker', width / 2, layout.footer.y + 98);
  showSharePreview(canvas, '📸 日签分享', 'FitnessTracker-Daily-' + formatLocalDate(today) + '.png');
}

/** 生成固定尺寸周报，并将每日状态与部位排行限制在正文安全区内。 */
function shareWeeklyReport() {
  const { canvas, ctx, layout } = drawShareCanvas('weekly');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() + (dayOfWeek === 0 ? -6 : 1 - dayOfWeek));
  const sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  const stats = computeStats(monday, sunday);
  const measure = text => ctx.measureText(text).width;
  const rangeText = `${monday.getMonth() + 1}/${monday.getDate()} - ${sunday.getMonth() + 1}/${sunday.getDate()}`;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e4e2df';
  ctx.font = 'bold 38px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`📊 训练周报  ${rangeText}`, layout.header.x, layout.header.y + 58);
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('本周训练节奏与部位分布', layout.header.x, layout.header.y + 96);

  const completionDays = stats.trainDays + stats.skipDays;
  const metrics = [
    { num: stats.trainDays, label: '训练天数', color: '#ff6b35' },
    { num: 7 - stats.trainDays - stats.skipDays, label: '休息天数', color: '#6b6864' },
    { num: completionDays ? Math.round(stats.trainDays / completionDays * 100) : 0, label: '完成率 %', color: '#22c55e' },
    { num: getCurrentStreak(), label: '连续打卡', color: '#4ecdc4' }
  ];
  const metricBounds = { x: layout.body.x, y: layout.body.y + 12, width: layout.body.width, height: 112 };
  drawMetricCards(ctx, metricBounds, metrics);

  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('每日完成', layout.body.x, layout.body.y + 158);
  const dayColumns = createMetricGrid({ x: layout.body.x, y: layout.body.y + 176, width: layout.body.width, height: 108 }, 7, 16, 108);
  const weekLabels = ['日', '一', '二', '三', '四', '五', '六'];
  dayColumns.forEach((column, index) => {
    const date = new Date(monday);
    date.setDate(monday.getDate() + index);
    const status = stats.dailyStatus[index];
    let color = '#3a3d47';
    if (status) {
      if (status.type === 'skip') color = 'rgba(232,93,117,0.5)';
      else if (status.type === 'cardio') color = '#60a5fa';
      else if (status.type === 'train') color = '#22c55e';
    }
    if (date > today) color = 'rgba(255,255,255,0.04)';
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    ctx.beginPath();
    roundedRect(ctx, column.x, column.y, column.width, column.height, 14);
    ctx.fill();
    ctx.fillStyle = color;
    ctx.beginPath();
    roundedRect(ctx, column.x + 12, column.y + 24, column.width - 24, 46, 8);
    ctx.fill();
    ctx.textAlign = 'center';
    ctx.fillStyle = '#c0bbb4';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(`${date.getMonth() + 1}/${date.getDate()}`, column.x + column.width / 2, column.y + 89);
    ctx.fillStyle = '#6b6864';
    ctx.font = '19px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(date > today ? '' : weekLabels[date.getDay()], column.x + column.width / 2, column.y + 105);
  });

  const colors = { back: '#4ecdc4', chest: '#ff6b35', shoulder: '#f0c040', abs: '#22c55e', legs: '#a78bfa', arms: '#f472b6', cardio: '#60a5fa' };
  const labels = { back: '背', chest: '胸', shoulder: '肩', abs: '腹', legs: '腿', arms: '手臂', cardio: '有氧' };
  const entries = Object.entries(stats.muscleCount);
  const plannedMuscles = planRankedItems(entries, 84, 42);
  const largestCount = plannedMuscles.reduce((largest, [, count]) => Math.max(largest, count), 1);
  const muscleY = layout.body.y + 334;
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('训练部位分布', layout.body.x, muscleY);
  plannedMuscles.forEach(([muscle, count], index) => {
    const y = muscleY + 16 + index * 42;
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    const label = ellipsizeText(measure, labels[muscle] || muscle, 100);
    const barWidth = Math.max(18, count / largestCount * (layout.body.width - 220));
    ctx.fillStyle = colors[muscle] || '#6b6864';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(label, layout.body.x, y + 24);
    ctx.beginPath();
    roundedRect(ctx, layout.body.x + 112, y + 6, barWidth, 18, 9);
    ctx.fill();
    ctx.fillStyle = '#a09d98';
    ctx.fillText(`${count} 次`, layout.body.x + 128 + barWidth, y + 24);
  });

  const topEntry = entries.sort((left, right) => right[1] - left[1])[0];
  let summary = '';
  if (stats.trainDays >= 7) summary = '全勤一周！你是真正的战士 💪';
  else if (stats.trainDays >= 4) summary = `这周练了${stats.trainDays}天，${topEntry ? (labels[topEntry[0]] || topEntry[0]) : ''}练得最多，继续保持！`;
  else if (stats.trainDays >= 1) summary = `这周练了${stats.trainDays}天，下周争取更多突破！`;
  else summary = '这周休息了一周，下周重新出发吧！';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c0bbb4';
  ctx.font = '23px "Microsoft YaHei","PingFang SC",sans-serif';
  const summaryLines = wrapText(measure, summary, layout.body.width - 80, 2).lines;
  summaryLines.forEach((line, index) => ctx.fillText(line, layout.body.x + layout.body.width / 2, layout.body.y + 466 + index * 28));

  ctx.fillStyle = '#6b6864';
  ctx.font = '18px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('FitnessTracker · 每周打卡', layout.footer.x + layout.footer.width / 2, layout.footer.y + 45);
  showSharePreview(canvas, '📊 周报分享', 'FitnessTracker-Weekly-' + formatLocalDate(sunday) + '.png');
}

/** 生成固定尺寸月报，以安全网格绘制当月日历并限制排行与总结行数。 */
function shareMonthlyReport() {
  const { canvas, ctx, layout } = drawShareCanvas('monthly');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const monthStart = new Date(today.getFullYear(), today.getMonth(), 1);
  const stats = computeStats(monthStart, today);
  const measure = text => ctx.measureText(text).width;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e4e2df';
  ctx.font = 'bold 38px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`📊 训练月报  ${today.getMonth() + 1}月`, layout.header.x, layout.header.y + 58);
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('当月训练热力与部位分布', layout.header.x, layout.header.y + 96);

  const metrics = [
    { num: stats.trainDays, label: '训练天数', color: '#ff6b35' },
    { num: stats.skipDays, label: '跳过天数', color: '#e85d75' },
    { num: stats.totalDays ? Math.round(stats.trainDays / stats.totalDays * 100) : 0, label: '出勤率 %', color: '#22c55e' },
    { num: getLongestStreak(), label: '最长连续', color: '#a78bfa' }
  ];
  const metricBounds = { x: layout.body.x, y: layout.body.y + 12, width: layout.body.width, height: 106 };
  drawMetricCards(ctx, metricBounds, metrics);

  const calendarBounds = { x: layout.body.x, y: layout.body.y + 200, width: 560, height: 248 };
  const firstColumn = (monthStart.getDay() + 6) % 7;
  const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
  const heatmapRows = Math.max(1, Math.ceil((firstColumn + daysInMonth) / 7));
  const heatmap = fitHeatmapGrid(calendarBounds, 7, heatmapRows, 10);
  const calendarX = calendarBounds.x + (calendarBounds.width - heatmap.width) / 2;
  const calendarY = calendarBounds.y;
  const weekLabels = ['一', '二', '三', '四', '五', '六', '日'];
  ctx.textAlign = 'center';
  ctx.fillStyle = '#a09d98';
  ctx.font = '20px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('当月热力', calendarBounds.x + calendarBounds.width / 2, calendarY - 24);
  for (let column = 0; column < 7; column += 1) {
    ctx.fillStyle = '#6b6864';
    ctx.font = '18px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(weekLabels[column], calendarX + column * (heatmap.cell + heatmap.gap) + heatmap.cell / 2, calendarY - 4);
  }
  const statusByDate = new Map(stats.dailyStatus.map(status => [status.ds, status]));
  for (let day = 1; day <= daysInMonth; day += 1) {
    const date = new Date(today.getFullYear(), today.getMonth(), day);
    const cellIndex = firstColumn + day - 1;
    const column = cellIndex % 7;
    const row = Math.floor(cellIndex / 7);
    const status = statusByDate.get(formatLocalDate(date));
    let color = date > today ? 'rgba(255,255,255,0.04)' : 'rgba(255,255,255,0.02)';
    if (status && status.type === 'skip') color = 'rgba(232,93,117,0.4)';
    else if (status && status.type === 'cardio') color = '#60a5fa';
    else if (status && status.type === 'train') {
      const cycleDay = getCycleDayForDate(date);
      color = cycleDay ? (cycleDay.colors?.[0] || cycleDay.color || '#333') : '#333';
    }
    const x = calendarX + column * (heatmap.cell + heatmap.gap);
    const y = calendarY + row * (heatmap.cell + heatmap.gap);
    ctx.fillStyle = color;
    ctx.beginPath();
    roundedRect(ctx, x, y, heatmap.cell, heatmap.cell, 6);
    ctx.fill();
    ctx.fillStyle = date > today ? '#555' : '#e4e2df';
    ctx.font = '16px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(String(day), x + heatmap.cell / 2, y + heatmap.cell / 2 + 6);
  }

  const colors = { back: '#4ecdc4', chest: '#ff6b35', shoulder: '#f0c040', abs: '#22c55e', legs: '#a78bfa', arms: '#f472b6', cardio: '#60a5fa' };
  const labels = { back: '背', chest: '胸', shoulder: '肩', abs: '腹', legs: '腿', arms: '手臂', cardio: '有氧' };
  const entries = Object.entries(stats.muscleCount);
  const plannedMuscles = planRankedItems(entries, 138, 46);
  const largestCount = plannedMuscles.reduce((largest, [, count]) => Math.max(largest, count), 1);
  const muscleBounds = { x: layout.body.x + 720, y: layout.body.y + 186, width: layout.body.width - 720, height: 138 };
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('训练部位分布', muscleBounds.x, muscleBounds.y - 14);
  plannedMuscles.forEach(([muscle, count], index) => {
    const y = muscleBounds.y + index * 46;
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    const label = ellipsizeText(measure, labels[muscle] || muscle, 110);
    const barWidth = Math.max(18, count / largestCount * (muscleBounds.width - 220));
    ctx.fillStyle = colors[muscle] || '#6b6864';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(label, muscleBounds.x, y + 26);
    ctx.beginPath();
    roundedRect(ctx, muscleBounds.x + 120, y + 8, barWidth, 18, 9);
    ctx.fill();
    ctx.fillStyle = '#a09d98';
    ctx.fillText(`${count} 次`, muscleBounds.x + 134 + barWidth, y + 26);
  });

  const rate = stats.totalDays ? Math.round(stats.trainDays / stats.totalDays * 100) : 0;
  const summary = `${rate >= 80 ? '出勤率优秀，继续加油 🔥' : rate >= 50 ? '还不错，下月保持节奏' : '下月争取更多训练日！'}  目标：${stats.trainDays + 3} 天`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c0bbb4';
  ctx.font = '23px "Microsoft YaHei","PingFang SC",sans-serif';
  const summaryLines = wrapText(measure, summary, muscleBounds.width - 40, 2).lines;
  summaryLines.forEach((line, index) => ctx.fillText(line, muscleBounds.x + muscleBounds.width / 2, layout.body.y + 402 + index * 30));

  ctx.fillStyle = '#6b6864';
  ctx.font = '18px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('FitnessTracker · 每月打卡', layout.footer.x + layout.footer.width / 2, layout.footer.y + 45);
  showSharePreview(canvas, '📊 月报分享', 'FitnessTracker-Monthly-' + (today.getMonth() + 1) + '.png');
}

/**
 * 生成固定纵版年度报告。月度概览、部位排行与总结分别占用预先划分的安全区域，
 * 因此训练记录再多也不会挤入页脚。
 */
function shareYearlyReport() {
  const { canvas, ctx, layout } = drawShareCanvas('yearly');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const year = today.getFullYear();
  const stats = computeYearlyStats();
  const measure = text => ctx.measureText(text).width;

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e4e2df';
  ctx.font = 'bold 42px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`🏆 ${year} 年度训练报告`, layout.header.x, layout.header.y + 68);
  ctx.fillStyle = '#a09d98';
  ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('你的汗水，数据记得', layout.header.x, layout.header.y + 108);

  const metrics = [
    { num: stats.trainDays, label: '训练天数', color: '#ff6b35' },
    { num: stats.skipDays, label: '跳过天数', color: '#e85d75' },
    { num: stats.totalD ? Math.round(stats.trainDays / stats.totalD * 100) : 0, label: '出勤率 %', color: '#22c55e' },
    { num: stats.longestStreak, label: '当年最长连续', color: '#a78bfa' }
  ];
  const metricBounds = { x: layout.body.x, y: layout.body.y + 12, width: layout.body.width, height: 128 };
  drawMetricCards(ctx, metricBounds, metrics);

  const overviewBounds = { x: layout.body.x, y: layout.body.y + 206, width: layout.body.width, height: 238 };
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('全年训练概览', overviewBounds.x, overviewBounds.y - 22);

  const monthColumns = 4;
  const monthRows = 3;
  const monthGap = 14;
  const monthWidth = (overviewBounds.width - monthGap * (monthColumns - 1)) / monthColumns;
  const monthHeight = (overviewBounds.height - monthGap * (monthRows - 1)) / monthRows;
  const globalWeekMax = Math.max(1, ...stats.monthWeeks.flat().filter(value => Number(value) > 0));
  for (let month = 0; month < 12; month += 1) {
    const column = month % monthColumns;
    const row = Math.floor(month / monthColumns);
    const x = overviewBounds.x + column * (monthWidth + monthGap);
    const y = overviewBounds.y + row * (monthHeight + monthGap);
    const isFuture = month > today.getMonth();
    const weeks = (stats.monthWeeks[month] || []).filter(value => value !== undefined);

    ctx.fillStyle = isFuture ? 'rgba(255,255,255,0.025)' : '#171a20';
    ctx.beginPath();
    roundedRect(ctx, x, y, monthWidth, monthHeight, 6);
    ctx.fill();
    ctx.fillStyle = '#8b8680';
    ctx.font = '18px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(`${month + 1} 月`, x + 14, y + 24);

    const barGap = 4;
    const barAreaX = x + 14;
    const barAreaY = y + 38;
    const barAreaWidth = monthWidth - 28;
    const barAreaHeight = monthHeight - 52;
    const barWidth = weeks.length ? Math.max(1, (barAreaWidth - barGap * (weeks.length - 1)) / weeks.length) : barAreaWidth;
    weeks.forEach((count, index) => {
      const barHeight = Math.max(8, Math.round((Number(count) || 0) / globalWeekMax * barAreaHeight));
      ctx.fillStyle = isFuture ? 'rgba(255,255,255,0.05)' : `rgba(255,107,53,${0.14 + (Number(count) || 0) / globalWeekMax * 0.76})`;
      ctx.beginPath();
      roundedRect(ctx, barAreaX + index * (barWidth + barGap), barAreaY + barAreaHeight - barHeight, barWidth, barHeight, 3);
      ctx.fill();
    });
  }

  const colors = { back: '#4ecdc4', chest: '#ff6b35', shoulder: '#f0c040', abs: '#22c55e', legs: '#a78bfa', arms: '#f472b6', cardio: '#60a5fa' };
  const labels = { back: '背部', chest: '胸部', shoulder: '肩部', abs: '腹部', legs: '腿部', arms: '手臂', cardio: '有氧' };
  const rankBounds = { x: layout.body.x, y: layout.body.y + 500, width: layout.body.width, height: 176 };
  const rankedMuscles = planRankedItems(Object.entries(stats.muscleCount), rankBounds.height, 44);
  const largestCount = rankedMuscles.reduce((largest, [, count]) => Math.max(largest, count), 1);
  ctx.textAlign = 'left';
  ctx.fillStyle = '#a09d98';
  ctx.font = '24px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('训练部位排行', rankBounds.x, rankBounds.y - 18);
  rankedMuscles.forEach(([muscle, count], index) => {
    const y = rankBounds.y + index * 44;
    const label = ellipsizeText(measure, labels[muscle] || muscle, 112);
    const barWidth = Math.max(20, count / largestCount * (rankBounds.width - 250));
    ctx.fillStyle = colors[muscle] || '#6b6864';
    ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.fillText(label, rankBounds.x, y + 28);
    ctx.beginPath();
    roundedRect(ctx, rankBounds.x + 128, y + 10, barWidth, 18, 9);
    ctx.fill();
    ctx.fillStyle = '#a09d98';
    ctx.fillText(`${count} 次`, rankBounds.x + 148 + barWidth, y + 28);
  });

  const sortedMuscles = Object.entries(stats.muscleCount).sort((left, right) => right[1] - left[1]);
  const topMuscle = sortedMuscles[0];
  const summaryItems = stats.trainDays > 0 ? [
    `训练偏好：最常训练${topMuscle ? (labels[topMuscle[0]] || topMuscle[0]) : '未记录部位'}`,
    `最努力月份：${stats.bestMonth + 1} 月完成 ${stats.bestMonthDays} 天训练`,
    `训练起始：${getStartDate().getFullYear()} 年 ${getStartDate().getMonth() + 1} 月 ${getStartDate().getDate()} 日`
  ] : ['本年度暂未记录训练，随时开始第一天。'];
  const summaryY = layout.body.y + 742;
  ctx.fillStyle = '#c0bbb4';
  ctx.font = '21px "Microsoft YaHei","PingFang SC",sans-serif';
  summaryItems.forEach((item, index) => {
    ctx.fillText(ellipsizeText(measure, item, layout.body.width), layout.body.x, summaryY + index * 34);
  });

  const footerBox = { x: layout.footer.x, y: layout.footer.y + 18, width: layout.footer.width, height: 52 };
  ctx.fillStyle = '#171a20';
  ctx.beginPath();
  roundedRect(ctx, footerBox.x, footerBox.y, footerBox.width, footerBox.height, 14);
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#8b8680';
  ctx.font = '19px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText(`FitnessTracker · ${year + 1}，继续加油 🔥`, footerBox.x + footerBox.width / 2, footerBox.y + 33);
  showSharePreview(canvas, '🌟 年报分享', 'FitnessTracker-Yearly-' + year + '.png');
}

// ============================================================================
// UI 渲染
// ============================================================================
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

function renderAll() {
  const cd = getTodayCycleDay();
  if (!cd && isTodaySkipped()) {
    renderHeader('skipped');
    renderHeatmap();
    renderCycleBar();
    renderSkippedDay();
  } else if (cd && cd.muscles[0] === 'cardio') {
    renderHeader('cardio');
    renderHeatmap();
    renderCycleBar();
    renderCardioDay();
  } else {
    renderHeader(cd ? cd.muscles[0] : 'back');
    renderHeatmap();
    renderCycleBar();
    renderTodayWorkout(getTodayCycleDayIndex());
  }
  renderLibrary(currentLibTab);
}

function renderSkippedDay() {
  $('#todaySection').style.display = 'block';
  $('#cardioSection').style.display = 'none';
  $('#todaySectionTitle').textContent = '⏭ 今日已跳过';
  const tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
  const nextCd = getCycleDayForDate(tomorrow);
