<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新手健身追踪器 · 胸肩背腹 · 5日循环</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #121418; --bg-card: #1e2127; --bg-card-hover: #262a32; --border: #2a2d36;
  --primary: #ff6b35; --primary-dim: rgba(255,107,53,0.10);
  --secondary: #4ecdc4; --secondary-dim: rgba(78,205,196,0.10);
  --text: #e4e2df; --text-secondary: #a09d98; --text-muted: #6b6864; --danger: #e85d75;
  --back: #4ecdc4; --chest: #ff6b35; --shoulder: #f0c040;
  --abs: #22c55e; --abs-dim: rgba(34,197,94,0.10);
  --cardio: #60a5fa; --cardio-dim: rgba(96,165,250,0.10);
  --radius: 10px; --radius-sm: 6px;
  --font: "Microsoft YaHei","PingFang SC","Noto Sans SC",system-ui,-apple-system,sans-serif;
}
html { font-size: 16px; scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; -webkit-font-smoothing: antialiased; }
.app { max-width: 780px; margin: 0 auto; padding: 20px 16px 60px; }

.header { background: var(--bg-card); border-radius: var(--radius); padding: 28px 24px 20px; text-align: center; margin-bottom: 20px; border: 1px solid var(--border); position: relative; overflow: hidden; }
.header::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.header.back::before { background: var(--back); }
.header.chest::before { background: var(--chest); }
.header.shoulder::before { background: var(--shoulder); }
.header.abs::before { background: var(--abs); }
.header.cardio::before { background: var(--cardio); }
.day-emoji { font-size: 48px; display: block; margin-bottom: 6px; line-height: 1; }
.day-label { font-size: 13px; text-transform: uppercase; letter-spacing: 3px; color: var(--text-muted); margin-bottom: 4px; }
.day-title { font-size: 32px; font-weight: 700; margin-bottom: 6px; }
.header.back .day-title { color: var(--back); }
.header.chest .day-title { color: var(--chest); }
.header.shoulder .day-title { color: var(--shoulder); }
.header.abs .day-title { color: var(--abs); }
.header.cardio .day-title { color: var(--cardio); }
.motivation { font-size: 15px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.7; }
.today-date { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; }
.header-actions { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.skip-btn, .custom-plan-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; background: transparent; border: 1px solid var(--border); color: var(--text-muted); border-radius: 20px; cursor: pointer; font-size: 13px; font-family: var(--font); transition: all 0.2s; }
.skip-btn:hover { border-color: var(--danger); color: var(--danger); }
.custom-plan-btn:hover { border-color: var(--primary); color: var(--primary); }

.cycle-bar { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px; margin-bottom: 20px; border: 1px solid var(--border); }
.cycle-bar h3 { font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; text-align: center; }
.cycle-days { display: flex; gap: 6px; justify-content: center; }
.cycle-day { flex: 1; max-width: 72px; text-align: center; padding: 10px 6px; border-radius: var(--radius-sm); background: var(--bg); border: 1px solid transparent; transition: all 0.2s; }
.cycle-day.today { border-color: var(--primary); background: var(--primary-dim); transform: scale(1.05); }
.cycle-day .cyc-date { font-size: 10px; color: var(--text-muted); margin-bottom: 3px; }
.cycle-day .cyc-emoji { font-size: 18px; display: block; margin-bottom: 2px; }
.cycle-day .cyc-label { font-size: 11px; font-weight: 600; }
.cycle-day.back .cyc-label { color: var(--back); }
.cycle-day.chest .cyc-label { color: var(--chest); }
.cycle-day.shoulder .cyc-label { color: var(--shoulder); }
.cycle-day.abs .cyc-label { color: var(--abs); }
.cycle-day.cardio .cyc-label { color: var(--cardio); opacity: 0.7; }
.cycle-day.skipped { opacity: 0.35; text-decoration: line-through; }
.cycle-day.skipped .cyc-label { color: var(--danger); }

.heatmap-section { background: var(--bg-card); border-radius: var(--radius); padding: 16px 20px 14px; margin-bottom: 20px; border: 1px solid var(--border); }
.heatmap-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 10px; flex-wrap: wrap; }
.heatmap-stat { text-align: center; }
.heatmap-stat .stat-num { font-size: 22px; font-weight: 700; }
.heatmap-stat .stat-num.train { color: var(--primary); }
.heatmap-stat .stat-num.skip { color: var(--danger); }
.heatmap-stat .stat-num.streak { color: var(--secondary); }
.heatmap-stat .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.heatmap-grid-wrap { overflow-x: auto; padding-bottom: 6px; }
.heatmap-grid-inner { display: inline-flex; flex-direction: column; min-width: 100%; }
.heatmap-month-row { display: flex; gap: 2px; margin-left: 24px; height: 18px; }
.heatmap-month-row .month-slot { width: 12px; flex-shrink: 0; position: relative; }
.heatmap-month-row .month-label { position: absolute; left: 0; font-size: 10px; color: var(--text-muted); white-space: nowrap; }
.heatmap-grid-body { display: flex; }
.heatmap-weekdays { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; margin-right: 4px; }
.heatmap-weekdays span { width: 20px; height: 12px; font-size: 9px; color: var(--text-muted); display: flex; align-items: center; justify-content: flex-end; }
.heatmap-grid { display: flex; gap: 2px; }
.heatmap-week-col { display: flex; flex-direction: column; gap: 2px; }
.heatmap-cell { width: 12px; height: 12px; border-radius: 2px; background: var(--bg); position: relative; cursor: default; flex-shrink: 0; outline: 1px solid rgba(255,255,255,0.04); outline-offset: -1px; }
.heatmap-cell:hover { outline: 1px solid rgba(255,255,255,0.4); z-index: 2; }
.heatmap-cell[data-tip]:hover::after { content: attr(data-tip); position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); white-space: nowrap; background: #333; color: #fff; font-size: 10px; padding: 4px 8px; border-radius: 4px; pointer-events: none; z-index: 10; font-family: var(--font); }
.heatmap-cell.today-cell { outline: 2px solid #fff; outline-offset: -1px; z-index: 1; }
.heatmap-cell.empty { background: rgba(255,255,255,0.04); pointer-events: none; }
.heatmap-cell.future { background: rgba(255,255,255,0.04); pointer-events: none; }
.heatmap-cell.back-cell { background: var(--back); }
.heatmap-cell.chest-cell { background: var(--chest); }
.heatmap-cell.shoulder-cell { background: var(--shoulder); }
.heatmap-cell.abs-cell { background: var(--abs); }
.heatmap-cell.cardio-cell { background: var(--cardio); }
.heatmap-cell.skip-cell { background: rgba(232,93,117,0.35); }
.heatmap-legend { display: flex; gap: 12px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
.heatmap-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-secondary); }
.heatmap-legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

.section-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.exercise-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
.exercise-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; transition: border-color 0.2s; cursor: pointer; }
.exercise-card:hover { border-color: #3a3d47; }
.exercise-card.expanded { border-color: var(--primary); }
.card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; user-select: none; }
.card-index { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-dim); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 16px; font-weight: 600; }
.card-meta { font-size: 13px; color: var(--text-muted); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.card-badges { display: flex; gap: 6px; margin-top: 3px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
.badge-beginner { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-intermediate { background: rgba(240,192,64,0.15); color: #f0c040; }
.badge-weight { background: var(--primary-dim); color: var(--primary); }
.badge-bw { background: rgba(96,165,250,0.15); color: #93c5fd; }
.card-arrow { font-size: 14px; color: var(--text-muted); transition: transform 0.3s; flex-shrink: 0; }
.exercise-card.expanded .card-arrow { transform: rotate(180deg); }

.card-detail { display: none; padding: 0 18px 20px; border-top: 1px solid var(--border); }
.exercise-card.expanded .card-detail { display: block; }

.params-table { width: 100%; border-collapse: collapse; margin: 12px 0 16px; font-size: 13px; }
.params-table tr { border-bottom: 1px solid rgba(255,255,255,0.05); }
.params-table tr:last-child { border-bottom: none; }
.params-table td { padding: 7px 6px; vertical-align: top; }
.params-table td:first-child { color: var(--text-muted); width: 90px; white-space: nowrap; font-weight: 600; font-size: 12px; }
.params-table td:last-child { color: var(--text-secondary); }
.params-table .val-highlight { color: var(--primary); font-weight: 600; }
.params-table .val-weight { color: var(--abs); font-weight: 600; }

.detail-section { margin-bottom: 14px; }
.detail-section h4 { font-size: 14px; font-weight: 600; color: var(--primary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }

.step-list { list-style: none; padding: 0; }
.step-list li { position: relative; padding-left: 24px; margin-bottom: 6px; font-size: 14px; color: var(--text-secondary); line-height: 1.6; }
.step-list li::before { content: attr(data-step); position: absolute; left: 0; top: 0; font-size: 11px; font-weight: 700; color: var(--primary); width: 18px; text-align: center; }

.mistake-list { list-style: none; padding: 0; }
.mistake-list li { position: relative; padding-left: 20px; margin-bottom: 5px; font-size: 14px; color: var(--danger); line-height: 1.6; }
.mistake-list li::before { content: '⚠'; position: absolute; left: 0; top: 0; font-size: 12px; }

.video-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.mw-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--primary-dim); color: var(--primary); border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background 0.2s; }
.mw-link:hover { background: rgba(255,107,53,0.2); }
.bili-link { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--secondary-dim); color: var(--secondary); border-radius: 20px; text-decoration: none; font-size: 13px; font-weight: 600; transition: background 0.2s; }
.bili-link:hover { background: rgba(78,205,196,0.2); }

.tag-nav { display: flex; gap: 8px; margin-bottom: 16px; background: var(--bg-card); border-radius: 24px; padding: 4px; border: 1px solid var(--border); overflow-x: auto; }
.tag-btn { flex: 1; padding: 10px 12px; border: none; border-radius: 20px; background: transparent; color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); transition: all 0.2s; white-space: nowrap; }
.tag-btn.active { background: var(--primary); color: #fff; }
.tag-btn:hover:not(.active) { color: var(--text); }

.cardio-day-content { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
.cardio-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.cardio-card:last-child { margin-bottom: 0; }
.cardio-card h3 { font-size: 16px; color: var(--cardio); margin-bottom: 10px; }
.cardio-card p { color: var(--text-secondary); font-size: 14px; line-height: 1.7; }
.cardio-card .tip-list { list-style: none; padding: 0; margin-top: 10px; }
.cardio-card .tip-list li { padding: 4px 0; font-size: 14px; color: var(--text-secondary); }
.cardio-card .tip-list li::before { content: '💡 '; }

.settings-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; margin-top: 20px; }
.settings-section summary { cursor: pointer; font-size: 14px; font-weight: 600; color: var(--text-muted); list-style: none; display: flex; align-items: center; gap: 6px; }
.settings-section summary::-webkit-details-marker { display: none; }
.settings-section summary::before { content: '⚙'; font-size: 16px; }
.settings-body { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.settings-body label { font-size: 13px; color: var(--text-secondary); display: block; margin-bottom: 6px; }
.settings-row { display: flex; gap: 8px; align-items: center; }
.settings-row input { flex: 1; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; font-family: var(--font); }
.settings-row input:focus { outline: none; border-color: var(--primary); }
.settings-row button { padding: 10px 18px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; font-weight: 600; font-family: var(--font); }
.settings-row button:hover { opacity: 0.9; }
.settings-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 24px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
.modal-box.large { max-width: 600px; }
.modal-box h3 { margin-bottom: 4px; font-size: 18px; }
.modal-box .modal-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.modal-box p { color: var(--text-secondary); font-size: 14px; margin-bottom: 20px; }

.exercise-check-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; max-height: 50vh; overflow-y: auto; }
.exercise-check-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s; }
.exercise-check-item:hover { border-color: var(--primary); background: var(--bg-card-hover); }
.exercise-check-item.selected { border-color: var(--primary); background: var(--primary-dim); }
.exercise-check-item input[type="checkbox"] { display: none; }
.exercise-check-item .check-box { width: 20px; height: 20px; border-radius: 4px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.exercise-check-item.selected .check-box { background: var(--primary); border-color: var(--primary); }
.exercise-check-item.selected .check-box::after { content: '✓'; color: #fff; font-size: 13px; font-weight: 700; }
.exercise-check-item .check-name { flex: 1; font-size: 14px; font-weight: 500; }
.exercise-check-item .check-meta { font-size: 11px; color: var(--text-muted); }
.exercise-check-item .check-order { width: 32px; text-align: center; font-size: 12px; color: var(--text-muted); cursor: default; }
.exercise-check-item.selected .check-order { color: var(--primary); font-weight: 700; }

.modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
.modal-actions button { padding: 10px 24px; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); border: none; transition: opacity 0.2s; }
.modal-actions button:hover { opacity: 0.9; }
.btn-cancel { background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border) !important; }
.btn-confirm { background: var(--primary); color: #fff; }
.btn-reset { background: transparent; color: var(--text-muted); border: none !important; font-size: 12px !important; padding: 8px 12px !important; margin-right: auto; }

.error-notice { background: rgba(232,93,117,0.1); border: 1px solid rgba(232,93,117,0.3); border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--danger); display: none; }

.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 12px 24px; border-radius: 24px; font-size: 14px; font-weight: 600; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s, transform 0.3s; box-shadow: 0 4px 20px rgba(255,107,53,0.3); display: flex; align-items: center; gap: 12px; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(4px); pointer-events: auto; }
.toast .undo-link { background: rgba(255,255,255,0.2); color: #fff; border: none; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: var(--font); white-space: nowrap; }
.toast .undo-link:hover { background: rgba(255,255,255,0.35); }

.undo-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-card); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; justify-content: center; gap: 16px; z-index: 200; transform: translateY(100%); transition: transform 0.3s cubic-bezier(.22,1,.36,1); }
.undo-bar.show { transform: translateY(0); }
.undo-bar span { font-size: 14px; color: var(--text-secondary); }
.undo-bar .undo-btn { padding: 8px 20px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: var(--font); }
.undo-bar .undo-btn:hover { opacity: 0.9; }
.undo-bar .dismiss-btn { padding: 8px 16px; background: transparent; color: var(--text-muted); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; font-family: var(--font); }
.undo-bar .dismiss-btn:hover { color: var(--text-secondary); }

@media (max-width: 600px) {
  .app { padding: 12px 10px 40px; }
  .header { padding: 22px 16px 18px; }
  .day-title { font-size: 26px; }
  .card-header { padding: 14px; gap: 10px; }
  .card-detail { padding: 0 12px 16px; }
  .cycle-day { padding: 8px 3px; }
  .cycle-day .cyc-emoji { font-size: 16px; }
  .params-table td:first-child { width: 70px; font-size: 11px; }
  .tag-btn { font-size: 12px; padding: 8px 10px; }
  .heatmap-cell { width: 10px; height: 10px; border-radius: 1px; }
  .heatmap-month-row .month-slot { width: 10px; }
  .heatmap-grid { gap: 2px; }
  .heatmap-week-col { gap: 2px; }
  .heatmap-stats { gap: 14px; }
  .heatmap-stat .stat-num { font-size: 18px; }
  .heatmap-legend { gap: 8px; }
  .heatmap-legend-item { font-size: 10px; }
}
</style>
</head>
<body>

<div class="app">
  <header class="header" id="header">
    <span class="day-emoji" id="dayEmoji"></span>
    <div class="day-label" id="dayLabel"></div>
    <h1 class="day-title" id="dayTitle"></h1>
    <p class="motivation" id="motivation"></p>
    <p class="today-date" id="todayDate"></p>
    <div class="header-actions">
      <button class="skip-btn" id="skipBtn" title="有事跳过，计划顺延一天">⏭ 今天练不了，顺延一天</button>
      <button class="custom-plan-btn" id="customPlanBtn" title="自定义今天练哪些动作">📝 自定义训练计划</button>
    </div>
  </header>

  <div class="heatmap-section" id="heatmapSection"></div>

  <div class="cycle-bar" id="cycleBar"></div>

  <section id="todaySection">
    <h2 class="section-title" id="todaySectionTitle">📋 今日训练</h2>
    <div class="exercise-list" id="todayList"></div>
  </section>

  <section id="cardioSection" style="display:none;"></section>

  <section class="library-section">
    <h2 class="section-title">📚 全部动作库（数据来源：MuscleWiki）</h2>
    <div class="tag-nav" id="tagNav">
      <button class="tag-btn active" data-muscle="back">🔵 背（9）</button>
      <button class="tag-btn" data-muscle="chest">🟠 胸（11）</button>
      <button class="tag-btn" data-muscle="shoulder">🟡 肩（11）</button>
      <button class="tag-btn" data-muscle="abs">🟢 腹（16）</button>
      <button class="tag-btn" data-muscle="legs">🟤 腿（6）</button>
      <button class="tag-btn" data-muscle="arms">🟣 手臂（3）</button>
    </div>
    <div class="exercise-list" id="libraryList"></div>
  </section>

  <details class="settings-section" id="settingsPanel">
    <summary>设置</summary>
    <div class="settings-body">
      <label>训练起始日期（修改后计划将重新对齐）</label>
      <div class="settings-row">
        <input type="date" id="startDateInput">
        <button id="saveStartDate">保存</button>
      </div>
      <p class="settings-hint">起始日为<b>背日</b>，按 背→胸→肩→腹→有氧 5 日循环（练四休一）</p>
      <button id="resetAllBtn" style="margin-top:16px;padding:8px 16px;background:transparent;border:1px solid var(--danger);color:var(--danger);border-radius:20px;cursor:pointer;font-size:13px;font-family:var(--font);">🗑 清空所有数据（重新开始）</button>
    </div>
  </details>
</div>

<!-- 跳过确认弹窗 -->
<div class="modal-overlay" id="skipModal">
  <div class="modal-box">
    <h3>确认跳过今天？</h3>

<script>
// ============================================================================
// 核心常量 — 5日循环：背→胸→肩→腹→有氧
// ============================================================================
const CYCLE = ['back','chest','shoulder','abs','cardio'];
const CYCLE_NAMES = {back:'背日',chest:'胸日',shoulder:'肩日',abs:'腹日',cardio:'有氧日'};
const MOTIVATIONS = {
  back:'打造倒三角，从每一次下拉开始',
  chest:'推起重量，推起自信',
  shoulder:'宽肩撑起气场，饱满三角肌',
  abs:'核心是力量之源，雕刻六块腹肌',
  cardio:'燃脂快走，甩掉脂肪保留肌肉 🚶'
};

// ============================================================================
// LocalStorage
// ============================================================================
const STORAGE_KEY = 'ft_start_date';
const SKIP_KEY = 'ft_skip_dates';
const CUSTOM_PLAN_PREFIX = 'ft_custom_';

// 日期工具：全部使用本地时间，避免 UTC 时区偏差（中国 UTC+8）
function parseLocalDate(str) { const [y,m,d]=str.split('-').map(Number); return new Date(y,m-1,d); }
function formatLocalDate(d) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dt=String(d.getDate()).padStart(2,'0'); return y+'-'+m+'-'+dt; }
function todayStr() { return formatLocalDate(new Date()); }

function getStartDate() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) { const d = parseLocalDate(raw); if (!isNaN(d)) return d; }
  const today = new Date(); today.setHours(0,0,0,0); saveStartDateRaw(today); return today;
}

// 跳过的日期列表
function getSkipDates() {
  try { const raw = localStorage.getItem(SKIP_KEY); return raw ? JSON.parse(raw) : []; } catch(e) { return []; }
}
function isDateSkipped(dateStr) { return getSkipDates().includes(dateStr); }
function isTodaySkipped() { return isDateSkipped(todayStr()); }

// 计算从起始日到今天之间，有多少个非跳过日（有效训练日）
function getDaysDiff() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipSet = new Set(getSkipDates());
  let count = 0;
  const d = new Date(start);
  while (d <= today) {
    if (!skipSet.has(formatLocalDate(d))) count++;
    d.setDate(d.getDate() + 1);
  }
  return count - 1; // 起始日当天 = 第 0 天
}

// 今天的训练部位（跳过日返回 'skipped'）
function getTodayMuscle() {
  if (isTodaySkipped()) return 'skipped';
  return CYCLE[((getDaysDiff() % 5) + 5) % 5];
}

// 计算某一天对应的训练部位（用于周期条）
function getMuscleForDate(date) {
  const ds = formatLocalDate(date);
  if (isDateSkipped(ds)) return 'skipped';
  const start = getStartDate();
  const skipSet = new Set(getSkipDates());
  let count = 0;
  const d = new Date(start);
  while (d <= date) {
    if (!skipSet.has(formatLocalDate(d))) count++;
    d.setDate(d.getDate() + 1);
  }
  const idx = count - 1;
  return CYCLE[((idx % 5) + 5) % 5];
}

// 撤销机制
let lastUndo = null;
function snapshotUndo(undoFn, label) {
  lastUndo = {undo: undoFn, label: label};
  $('#undoLabel').textContent = '刚刚执行了：' + label;
  $('#undoBar').classList.add('show');
}
function clearUndo() {
  lastUndo = null;
  $('#undoBar').classList.remove('show');
}
function performUndo() {
  if (!lastUndo) return;
  lastUndo.undo();
  const label = lastUndo.label;
  clearUndo();
  renderAll();
  showToast('↩ 已撤销：' + label);
}

function saveStartDate(d) {
  const old = localStorage.getItem(STORAGE_KEY);
  snapshotUndo(() => { if (old) localStorage.setItem(STORAGE_KEY, old); else localStorage.removeItem(STORAGE_KEY); }, '修改起始日期');
  localStorage.setItem(STORAGE_KEY, formatLocalDate(d));
}
function saveStartDateRaw(d) { localStorage.setItem(STORAGE_KEY, formatLocalDate(d)); }

// 跳过今天：将今天加入跳过列表，不影响起始日
function skipToday() {
  if (isTodaySkipped()) return;
  const ts = todayStr();
  const oldSkips = getSkipDates();
  snapshotUndo(() => { localStorage.setItem(SKIP_KEY, JSON.stringify(oldSkips)); }, '跳过今天');
  const newSkips = [...oldSkips, ts];
  localStorage.setItem(SKIP_KEY, JSON.stringify(newSkips));
}

function getCustomPlan(muscle) {
  try {
    const raw = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
    if (raw) { const arr = JSON.parse(raw); if (Array.isArray(arr) && arr.length > 0) return arr; }
  } catch(e) {}
  return null;
}
function saveCustomPlan(muscle, ids) {
  const old = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
  snapshotUndo(() => { if (old) localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, old); else localStorage.removeItem(CUSTOM_PLAN_PREFIX + muscle); }, '自定义' + CYCLE_NAMES[muscle] + '计划');
  localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, JSON.stringify(ids));
}
function resetCustomPlan(muscle) {
  const old = localStorage.getItem(CUSTOM_PLAN_PREFIX + muscle);
  snapshotUndo(() => { if (old) localStorage.setItem(CUSTOM_PLAN_PREFIX + muscle, old); }, '恢复默认' + CYCLE_NAMES[muscle] + '计划');
  localStorage.removeItem(CUSTOM_PLAN_PREFIX + muscle);
}
function getEffectivePlan(muscle) {
  return getCustomPlan(muscle) || EXERCISES.filter(e => e.muscle === muscle && e.core).map(e => e.id);
}

function renderCycleBar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const em = {back:'💪',chest:'🔥',shoulder:'🏋️',abs:'🧱',cardio:'🚶',skipped:'⏭'};

  for (let o = -2; o <= 2; o++) {

    const m = getMuscleForDate(d);
    h += `<div class="cycle-day ${m==='skipped'?'skipped':m}${o===0?' today':''}"><span class="cyc-date">${d.getMonth()+1}/${d.getDate()}</span><span class="cyc-emoji">${em[m]}</span><span class="cyc-label">${names[m]}</span></div>`;
  }

}

function renderHeatmap() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipSet = new Set(getSkipDates());
  const DAY_EMOJI = {back:'💪',chest:'🔥',shoulder:'🏋️',abs:'🧱',cardio:'🚶'};
  const DAY_NAMES = CYCLE_NAMES;

  // ── 统计 ──
  let trainDays = 0, skipDays = 0;
  const d0 = new Date(start);
  while (d0 <= today) {
    const ds = formatLocalDate(d0);
    if (skipSet.has(ds)) skipDays++;
    else trainDays++;
    d0.setDate(d0.getDate() + 1);
  }
  let streak = 0;
  const check = new Date(today);
  while (check >= start) {
    if (skipSet.has(formatLocalDate(check))) break;
    streak++;
    check.setDate(check.getDate() - 1);
  }

  // ── 统计行 ──
  let h = '<div class="heatmap-stats">';
  h += `<div class="heatmap-stat"><div class="stat-num train">${trainDays}</div><div class="stat-label">🏋️ 训练天数</div></div>`;
  h += `<div class="heatmap-stat"><div class="stat-num skip">${skipDays}</div><div class="stat-label">⏭ 跳过天数</div></div>`;
  h += `<div class="heatmap-stat"><div class="stat-num streak">${streak}</div><div class="stat-label">🔥 连续训练</div></div>`;
  h += '</div>';

  // ── 格子图（GitHub 风格：从年初到现在，全量展示） ──
  // 从 start 年 1 月 1 日所在周的周一开始
  const yearStart = new Date(start.getFullYear(), 0, 1);
  const ysDow = yearStart.getDay();
  const gridStart = new Date(yearStart);
  gridStart.setDate(gridStart.getDate() + (ysDow === 0 ? -6 : 1 - ysDow));

  // 到本月最后一天所在周的周日（完整显示当前月份）
  const monthLast = new Date(today.getFullYear(), today.getMonth() + 1, 0); // 本月最后一天
  const mlDow = monthLast.getDay();
  const gridEnd = new Date(monthLast);
  gridEnd.setDate(gridEnd.getDate() + (mlDow === 0 ? 0 : 7 - mlDow));

  // 建立周列数组
  const weeks = [];
  const monthOffsets = []; // {colIndex, label} 用于顶部月份标记
  const cursor = new Date(gridStart);
  let colIdx = 0;
  while (cursor <= gridEnd) {
    const week = [];
    for (let dow = 0; dow < 7; dow++) {
      const d = new Date(cursor);
      d.setDate(d.getDate() + dow);
      week.push(new Date(d));
    }
    // 检查本周是否包含某月 1 号
    const midDate = week[3]; // 周四 ≈ 周的代表日
    if (midDate.getDate() <= 7) {
      monthOffsets.push({col: colIdx, label: (midDate.getMonth()+1)+'月'});
    }
    weeks.push(week);
    colIdx++;
    cursor.setDate(cursor.getDate() + 7);
  }

  // 星期标签（只标一三五）
  const dayLabels = ['', '一','','三','','五',''];
  // 周一～周日（GitHub 是周日在上，这里改用周一在上）
  const dowOrder = [0,1,2,3,4,5,6]; // Mon=0...Sun=6, 但 JS getDay() Sun=0
  // 重新排序为 一~日：JS dow 1,2,3,4,5,6,0
  const rowOrder = [1,2,3,4,5,6,0]; // Mon=1, Tue=2, ..., Sun=0

  // 月份标签映射：colIndex → label
  const monthMap = {};
  for (const mo of monthOffsets) { monthMap[mo.col] = mo.label; }

  h += '<div class="heatmap-grid-wrap"><div class="heatmap-grid-inner">';

  // 顶部月份行（flex 对齐，与下方格子列一一对应）
  h += '<div class="heatmap-month-row">';
  for (let i = 0; i < weeks.length; i++) {
    if (monthMap[i] !== undefined) {
      h += `<div class="month-slot"><span class="month-label">${monthMap[i]}</span></div>`;
    } else {
      h += '<div class="month-slot"></div>';
    }
  }
  h += '</div>';

  // 主体：星期标签 + 格子
  h += '<div class="heatmap-grid-body">';
  // 左侧星期
  h += '<div class="heatmap-weekdays">';
  for (const dow of rowOrder) {
    h += `<span>${dayLabels[dow]}</span>`;
  }
  h += '</div>';

  // 格子矩阵
  h += '<div class="heatmap-grid">';
  const todayDs = formatLocalDate(today);
  for (const week of weeks) {
    h += '<div class="heatmap-week-col">';
    for (const dow of rowOrder) {
      const d = week[dow];
      const ds = formatLocalDate(d);
      const isBeforeStart = d < start;
      const isAfterToday = d > today;
      let cls = '', tip = '';
      if (isBeforeStart) {
        cls = 'empty';
      } else if (isAfterToday) {
        cls = 'future';
      } else if (skipSet.has(ds)) {
        cls = 'skip-cell';
        tip = `${d.getMonth()+1}/${d.getDate()} ⏭ 跳过`;
      } else {
        const muscle = getMuscleForDate(d);
        const mcls = muscle === 'skipped' ? 'skip-cell' : muscle + '-cell';
        const mlabel = DAY_NAMES[muscle] || muscle;
        cls = mcls + (ds === todayDs ? ' today-cell' : '');
        tip = `${d.getMonth()+1}/${d.getDate()} ${DAY_EMOJI[muscle]||''} ${mlabel}`;
      }
      h += `<div class="heatmap-cell ${cls}"${tip ? ` data-tip="${tip}"` : ''}></div>`;
    }
    h += '</div>';
  }
  h += '</div></div></div></div>';

  // ── 图例 ──
  h += '<div class="heatmap-legend">';
  const legendItems = [
    {color:'var(--back)', label:'背日'},
    {color:'var(--chest)', label:'胸日'},
    {color:'var(--shoulder)', label:'肩日'},
    {color:'var(--abs)', label:'腹日'},
    {color:'var(--cardio)', label:'有氧'},
    {color:'rgba(232,93,117,0.4)', label:'跳过'},
  ];
  for (const item of legendItems) {
    h += `<div class="heatmap-legend-item"><span class="heatmap-legend-dot" style="background:${item.color}"></span>${item.label}</div>`;
  }
  h += '</div>';

  $('#heatmapSection').innerHTML = h;
}

  const diffClass = ex.difficulty === '新手' ? 'badge-beginner' : 'badge-intermediate';

  return `<div class="exercise-card" data-id="${ex.id}"><div class="card-header" onclick="toggleCard(this)"><div class="card-index">${String(index+1).padStart(2,'0')}</div><div class="card-info"><div class="card-name">${ex.name} <span style="font-weight:400;font-size:12px;color:var(--text-muted)">${ex.nameEn}</span></div><div class="card-meta"><span>📊 ${ex.working}</span><span>⏱ ${ex.rest}</span></div><div class="card-badges"><span class="badge ${diffClass}">${ex.difficulty}</span><span class="badge ${weightClass}">${ex.weight}</span></div></div><div class="card-arrow">▼</div></div><div class="card-detail"><table class="params-table"><tr><td>🏋️ 器械</td><td>${ex.equipment}</td></tr><tr><td>⚖ 建议重量</td><td><span class="val-weight">${ex.weight}</span></td></tr><tr><td>🔥 热身组</td><td>${ex.warmup}</td></tr><tr><td>💪 正式组</td><td><span class="val-highlight">${ex.working}</span></td></tr><tr><td>⏱ 组间休息</td><td>${ex.rest}</td></tr><tr><td>🎯 动作节奏</td><td>${ex.tempo}</td></tr></table><div class="detail-section"><h4>📝 动作要领</h4><ol class="step-list">${ex.steps.map((s,i) => `<li data-step="${String(i+1).padStart(2,'0')}">${s}</li>`).join('')}</ol></div><div class="detail-section"><h4>⚠️ 常见错误</h4><ul class="mistake-list">${ex.mistakes.map(m => `<li>${m}</li>`).join('')}</ul></div><div class="video-links"><a class="mw-link" href="https://musclewiki.com/zh-cn/exercise/${ex.mwSlug}" target="_blank" rel="noopener">🎬 MuscleWiki 动作演示</a><a class="bili-link" href="https://www.bilibili.com/video/${ex.bv}" target="_blank" rel="noopener">▶ B站中文教学</a></div></div></div>`;
}

// 自定义计划
let customPlanTarget = null;
function openCustomPlan(muscle) {
  customPlanTarget = muscle;
  const currentPlan = getEffectivePlan(muscle);
  const allExs = EXERCISES.filter(e => e.muscle === muscle);
  const selectedSet = new Set(currentPlan);
  $('#customPlanTitle').textContent = `📝 自定义 ${CYCLE_NAMES[muscle]} 训练计划`;
  $('#customPlanSubtitle').textContent = `勾选想要训练的动作，顺序 = 勾选顺序。共 ${allExs.length} 个可选动作`;
  $('#customPlanError').style.display = 'none';
  const orderedExs = [];
  for (const id of currentPlan) { const ex = allExs.find(e => e.id === id); if (ex) orderedExs.push({ex, selected:true}); }
  for (const ex of allExs) { if (!selectedSet.has(ex.id)) orderedExs.push({ex, selected:false}); }
  $('#customPlanList').innerHTML = orderedExs.map(({ex, selected}) => {
    const diffClass = ex.difficulty === '新手' ? 'badge-beginner' : 'badge-intermediate';
    return `<div class="exercise-check-item${selected?' selected':''}" data-id="${ex.id}" onclick="togglePlanItem(this)"><div class="check-box"></div><span class="check-name">${ex.name}</span><span class="badge ${diffClass}" style="flex-shrink:0">${ex.difficulty}</span><span class="check-order">${selected?'#'+(currentPlan.indexOf(ex.id)+1):''}</span></div>`;
  }).join('');
  $('#customPlanModal').classList.add('show');
}
function togglePlanItem(el) { el.classList.toggle('selected'); updatePlanOrderDisplay(); }
function updatePlanOrderDisplay() {
  const selectedEls = $$('#customPlanList .exercise-check-item.selected');
  selectedEls.forEach((el, i) => { el.querySelector('.check-order').textContent = '#' + (i + 1); });
  $$('#customPlanList .exercise-check-item:not(.selected)').forEach(el => { el.querySelector('.check-order').textContent = ''; });
  $('#customPlanError').style.display = selectedEls.length === 0 ? 'block' : 'none';
}
function closeCustomPlan() { $('#customPlanModal').classList.remove('show'); customPlanTarget = null; }
function confirmCustomPlan() {
  const selectedEls = $$('#customPlanList .exercise-check-item.selected');
  if (selectedEls.length === 0) { $('#customPlanError').style.display = 'block'; return; }
  saveCustomPlan(customPlanTarget, Array.from(selectedEls).map(el => el.dataset.id));
  closeCustomPlan();
  showToast('✅ ' + CYCLE_NAMES[customPlanTarget] + '计划已保存');
  renderAll();
}
function resetCurrentPlan() {
  if (!customPlanTarget) return;
  resetCustomPlan(customPlanTarget);
  const allExs = EXERCISES.filter(e => e.muscle === customPlanTarget);
  const defaultSet = new Set(allExs.filter(e => e.core).map(e => e.id));
  $$('#customPlanList .exercise-check-item').forEach(item => {
    if (defaultSet.has(item.dataset.id)) item.classList.add('selected'); else item.classList.remove('selected');
  });
  updatePlanOrderDisplay();
  showToast('🔄 已恢复默认计划');
}
$('#customPlanBtn').addEventListener('click', () => { const m = getTodayMuscle(); if (m !== 'cardio') openCustomPlan(m); });
$('#btnCancelPlan').addEventListener('click', closeCustomPlan);
$('#btnConfirmPlan').addEventListener('click', confirmCustomPlan);
$('#btnResetPlan').addEventListener('click', resetCurrentPlan);
$('#customPlanModal').addEventListener('click', function(e) { if (e.target===this) closeCustomPlan(); });

// 设置
function updateSettingsUI() { $('#startDateInput').value = formatLocalDate(getStartDate()); }
$('#saveStartDate').addEventListener('click', () => {
  const val = $('#startDateInput').value; if (!val) return;
  const d = new Date(val); if (isNaN(d)) return;
  // 保存旧状态（起始日 + 跳过列表），一次性撤销
  const oldStart = localStorage.getItem(STORAGE_KEY);
  const oldSkips = getSkipDates();
  snapshotUndo(() => {
    if (oldStart) localStorage.setItem(STORAGE_KEY, oldStart);
    localStorage.setItem(SKIP_KEY, JSON.stringify(oldSkips));
  }, '修改起始日期');
  localStorage.setItem(STORAGE_KEY, formatLocalDate(d));
  localStorage.removeItem(SKIP_KEY);
  renderAll();
  showToast('✅ 起始日期已更新，跳过记录已清空');
});
// 清空所有数据
$('#resetAllBtn').addEventListener('click', () => {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SKIP_KEY);
  ['back','chest','shoulder','abs'].forEach(m => localStorage.removeItem(CUSTOM_PLAN_PREFIX + m));
  clearUndo();
  location.reload();
});

function showToast(msg) {
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove('show'), 2500);
}
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    $('#skipModal').classList.remove('show');
    if ($('#customPlanModal').classList.contains('show')) closeCustomPlan();
    $$('.exercise-card.expanded').forEach(c => c.classList.remove('expanded'));
  }
});

updateSettingsUI();
renderAll();
console.log('🏋️ 新手健身追踪器 · 背→胸→肩→腹→有氧 · 共' + EXERCISES.length + '个动作');
</script>
</body>
