  $('#todayList').innerHTML = `
    <div class="cardio-day-content" style="text-align:center;padding:40px 24px;">
      <span style="font-size:60px;display:block;margin-bottom:12px;">⏭</span>
      <h3 style="margin-bottom:8px;color:var(--text-secondary);">今天已跳过</h3>
      <p style="color:var(--text-muted);font-size:14px;line-height:1.7;">
        训练计划已整体后移一天<br>
        明天恢复：<strong style="color:var(--primary);">${nextName}</strong>
      </p>
      <p style="color:var(--text-muted);font-size:12px;margin-top:10px;">
        如需还原，点底部"↩ 撤销"按钮
      </p>
    </div>`;
}

function renderHeader(muscle) {
  const h = $('#header');
  const isTodayCardioReplacement = isDateCardio(todayStr()); // 有氧替换日
  const cd = isTodayCardioReplacement ? null : getTodayCycleDay();
  const cssMuscle = isTodayCardioReplacement ? 'cardio' : (cd ? cd.muscles[0] : 'cardio');
  h.className = 'header ' + (muscle === 'skipped' ? 'cardio' : cssMuscle);
  const dem = isTodayCardioReplacement ? '🫀' : (cd ? cd.emoji : '⏭');
  $('#dayEmoji').textContent = dem;
  const emLen = Array.from(dem).length;
  $('#dayEmoji').style.fontSize = emLen > 4 ? '28px' : emLen > 2 ? '38px' : '';
  if (isTodayCardioReplacement) {
    $('#dayLabel').textContent = '有氧日';
    $('#dayTitle').textContent = '有氧替换';
    $('#motivation').textContent = '计划有变，来一场酣畅淋漓的有氧吧！';
  } else {
    $('#dayLabel').textContent = cd ? cd.name : (muscle === 'skipped' ? '已跳过' : getCycleDayName(muscle));
    $('#dayTitle').textContent = cd ? cd.name : (muscle === 'skipped' ? '已跳过' : getCycleDayName(muscle));
    $('#motivation').textContent = (cd && cd.motivation) ? cd.motivation : '今天休息，训练计划已整体后移';
  }
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  $('#todayDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${wd[now.getDay()]}`;
  const isSkipped = muscle === 'skipped';
  const checkedIn = isTodayCheckedIn();

  // 打卡按钮状态
  const checkinBtn = $('#checkinBtn');
  const checkinHint = $('#checkinHint');
  const headerShareBtns = $('#headerShareBtns');
  if (isSkipped) {
    checkinBtn.style.display = 'none';
    if (checkinHint) checkinHint.style.display = 'none';
    headerShareBtns.style.display = 'none';
  } else if (checkedIn) {
    checkinBtn.style.display = '';
    checkinBtn.className = 'checkin-btn checked';
    checkinBtn.textContent = '✅ 今日已打卡（点击取消）';
    checkinBtn.disabled = false;
    checkinBtn.title = '再次点击取消打卡并清空勾选';
    if (checkinHint) checkinHint.style.display = 'none';
    headerShareBtns.style.display = '';
  } else {
    checkinBtn.style.display = '';
    checkinBtn.className = 'checkin-btn';
    checkinBtn.textContent = '🔥 今日打卡';
    // 初始禁用，等动作勾选后启用
    const exs = getTodayExercises();
    checkinBtn.disabled = exs.length === 0;
    if (checkinHint) checkinHint.style.display = exs.length === 0 ? '' : 'none';
    headerShareBtns.style.display = 'none';
  }

  if (isSkipped) {
    $('#customPlanBtn').style.display = 'none';
    $('#skipBtn').style.display = 'none';
    $('#unskipBtn').style.display = '';
  } else {
    $('#customPlanBtn').style.display = '';
    $('#skipBtn').style.display = '';
    $('#unskipBtn').style.display = 'none';
    $('#skipBtn').textContent = cd && cd.muscles[0] === 'cardio' ? '⏭ 今天休息，顺延一天' : '⏭ 今天练不了，顺延一天';
  }
}

function renderCycleBar() {
  const today = new Date(); today.setHours(0,0,0,0);
  const cycle = getCycle();
  const cycleLen = cycle.length;
  const skipSet = new Set(getSkipDates());
  const checkinSet = getCheckinSet();
  // 生成周期描述文字
  const cycleDesc = cycle.map(d => d.name).join('→');
  let h = `<h3>📅 训练周期（${cycleLen}日循环：${cycleDesc}）</h3><div class="cycle-days">`;
  for (let o = -2; o <= 2; o++) {
    const d = new Date(today); d.setDate(d.getDate()+o);
    const ds = formatLocalDate(d);
    const cd = getCycleDayForDate(d);
    const cssCls = cd ? cd.muscles[0] : 'skipped';
    const emoji = cd ? compactEmoji(cd, 2) : '⏭';
    const label = cd ? cd.name : '跳过';
    const labelClr = cd ? getDayLabelColor(cd) : '';
    // 打卡圆点
    let dotHtml = '';
    if (skipSet.has(ds)) {
      dotHtml = '<span class="cyc-dot skipped-dot"></span>';
    } else if (checkinSet.has(ds)||localStorage.getItem('ft_checkin_'+ds)!==null||localStorage.getItem('ft_done_'+ds)!==null) {
      dotHtml = '<span class="cyc-dot done"></span>';
    } else if (d <= today) {
      dotHtml = '<span class="cyc-dot undone"></span>';
    }
    h += `<div class="cycle-day ${cd?'':'skipped'}${o===0?' today':''}"><span class="cyc-date">${d.getMonth()+1}/${d.getDate()}${dotHtml}</span><span class="cyc-emoji">${emoji}</span><span class="cyc-label" style="color:${labelClr}">${label}</span></div>`;
  }
  h += '</div>';
  $('#cycleBar').innerHTML = h;
}

function renderHeatmap() {
  const start = getStartDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const skipSet = new Set(getSkipDates());
  const DAY_NAMES = getCycleDayNames();
  function getDayEmoji(muscle) { const cd = getCycle().find(d => d.muscles.includes(muscle)); return cd ? cd.emoji : ''; }

  // ── 统计 ──
  const cardioSet3 = new Set(getCardioDates());
  let trainDays = 0, skipDays = 0;
  const d0 = new Date(start);
  while (d0 <= today) {
    const ds = formatLocalDate(d0);
    if (skipSet.has(ds)) skipDays++;
    else trainDays++; // 含正常训练日+有氧替换日
    d0.setDate(d0.getDate() + 1);
  }
  let streak = 0;
  const check = new Date(today);
  while (check >= start) {
    const cds = formatLocalDate(check);
    if (skipSet.has(cds)) break;
    streak++;
    check.setDate(check.getDate() - 1);
  }
  const longest = getLongestStreak();

  // ── 统计行 ──
  let h = '<div class="heatmap-stats">';
  h += `<div class="heatmap-stat"><div class="stat-num train">${trainDays}</div><div class="stat-label">🏋️ 训练天数</div></div>`;
  h += `<div class="heatmap-stat"><div class="stat-num skip">${skipDays}</div><div class="stat-label">⏭ 跳过天数</div></div>`;
  h += `<div class="heatmap-stat"><div class="stat-num streak">${streak}</div><div class="stat-label">🔥 连续训练</div></div>`;
  h += `<div class="heatmap-stat"><div class="stat-num record">${longest}</div><div class="stat-label">🏆 最长纪录</div></div>`;
  h += '</div>';
  h += '<div class="share-btn-group">';
  h += '<button class="share-btn-sm" onclick="shareHeatmap()">📤 热力图</button>';
  h += '<button class="share-btn-sm" onclick="shareCheckinCard()">📸 日签</button>';
  h += '<button class="share-btn-sm" onclick="shareWeeklyReport()">📊 周报</button>';
  h += '<button class="share-btn-sm" onclick="shareMonthlyReport()">📊 月报</button>';
  h += '<button class="share-btn-sm" onclick="shareYearlyReport()">📊 年报</button>';
  h += '</div>';
  // 下一个里程碑提示
  const nextBadge = getNextBadge(getCurrentStreak());
  if (nextBadge) {
    const remainDays = nextBadge.days - getCurrentStreak();
    h += `<div style="text-align:center;font-size:11px;color:var(--text-muted);margin-top:4px;">还差 <span style="color:${nextBadge.color};font-weight:600;">${remainDays}</span> 天解锁 ${nextBadge.icon} ${nextBadge.name}</div>`;
  }

  // ── 格子图（GitHub 风格：从年初到现在，全量展示） ──
  // 从 start 年 1 月 1 日所在周的周一开始（week[0]=周一，Mon-Sun 周）
  const yearStart = new Date(start.getFullYear(), 0, 1);
  const ysDow = yearStart.getDay();
  const gridStart = new Date(yearStart);
  gridStart.setDate(gridStart.getDate() + (ysDow === 0 ? -6 : 1 - ysDow)); // 回退到周一，Mon-Sun 周

  // 到本月最后一天所在周的周六（完整显示当前月份）
  const monthLast = new Date(today.getFullYear(), today.getMonth() + 1, 0); // 本月最后一天
  const mlDow = monthLast.getDay();
  const gridEnd = new Date(monthLast);
  gridEnd.setDate(gridEnd.getDate() + (mlDow === 0 ? 0 : 7 - mlDow));

  // 建立周列数组
  const weeks = [];
  const monthOffsets = []; // {colIndex, label} 用于顶部月份标记
  const cursor = new Date(gridStart);
  let colIdx = 0;
  while (cursor <= gridEnd) {
    const week = [];
    for (let dow = 0; dow < 7; dow++) {
      const d = new Date(cursor);
      d.setDate(d.getDate() + dow);
      week.push(new Date(d));
    }
    // 检查本周是否包含某月 1 号
    const midDate = week[3]; // 周四 ≈ 周的代表日（week[0]=周一）
    if (midDate.getDate() <= 7) {
      monthOffsets.push({col: colIdx, label: (midDate.getMonth()+1)+'月'});
    }
    weeks.push(week);
    colIdx++;
    cursor.setDate(cursor.getDate() + 7);
  }

  // 星期标签（只标一三五）：Row 0=周一, Row 2=周三, Row 4=周五
  const dayLabels = ['一','','三','','五','',''];
  // rowOrder: week[0]=Mon(顶) → week[6]=Sun(底)，每周 Mon-Sun
  const rowOrder = [0,1,2,3,4,5,6];

  // 月份标签映射：colIndex → label
  const monthMap = {};
  for (const mo of monthOffsets) { monthMap[mo.col] = mo.label; }

  h += '<div class="heatmap-grid-wrap"><div class="heatmap-grid-inner">';

  // 顶部月份行（flex 对齐，与下方格子列一一对应）
  h += '<div class="heatmap-month-row">';
  for (let i = 0; i < weeks.length; i++) {
    if (monthMap[i] !== undefined) {
      h += `<div class="month-slot"><span class="month-label">${monthMap[i]}</span></div>`;
    } else {
      h += '<div class="month-slot"></div>';
    }
  }
  h += '</div>';

  // 主体：星期标签 + 格子
  h += '<div class="heatmap-grid-body">';
  // 左侧星期
  h += '<div class="heatmap-weekdays">';
  for (const dow of rowOrder) {
    h += `<span>${dayLabels[dow]}</span>`;
  }
  h += '</div>';

  // 格子矩阵
  h += '<div class="heatmap-grid">';
  const todayDs = formatLocalDate(today);
  for (const week of weeks) {
    h += '<div class="heatmap-week-col">';
    for (const dow of rowOrder) {
      const d = week[dow];
      const ds = formatLocalDate(d);
      const isBeforeStart = d < start;
      const isAfterToday = d > today;
      let cls = '', tip = '', style = '';
      if (isBeforeStart) {
        cls = 'empty';
      } else if (isAfterToday) {
        cls = 'future';
      } else if (skipSet.has(ds)) {
        cls = 'skip-cell';
        tip = `${d.getMonth()+1}/${d.getDate()} ⏭ 跳过`;
      } else if (cardioSet3.has(ds)) {
        cls = 'cardio-cell';
        tip = `${d.getMonth()+1}/${d.getDate()} 🫀 有氧日`;
      } else {
        const cd = getCycleDayForDate(d);
        const label = cd ? cd.name : '';
        const bg = getDayBg(cd);
        tip = `${d.getMonth()+1}/${d.getDate()} ${cd?cd.emoji:''} ${label}`;
        cls = (ds === todayDs ? ' today-cell' : '');
        // inline style for gradient multi-color support
        style = `background:${bg};`;
      }
      const clickable = !isBeforeStart && !isAfterToday;
      h += `<div class="heatmap-cell ${cls}${clickable?' clickable-cell':''}" style="${style||''}"${tip ? ` data-tip="${tip}"` : ''}${clickable ? ` onclick="toggleSkipDate('${ds}')" title="点击切换：正常→跳过→有氧→正常"` : ''}></div>`;
    }
    h += '</div>';
  }
  h += '</div></div></div></div>';

  // ── 图例 ──
  h += '<div class="heatmap-legend">';
  const legendItems = [
    {color:'var(--back)', label:'背日'},
    {color:'var(--chest)', label:'胸日'},
    {color:'var(--shoulder)', label:'肩日'},
    {color:'var(--abs)', label:'腹日'},
    {color:'var(--cardio)', label:'有氧'},
    {color:'var(--cardio)', label:'🫀有氧替换'},
    {color:'rgba(232,93,117,0.4)', label:'跳过'},
  ];
  for (const item of legendItems) {
    h += `<div class="heatmap-legend-item"><span class="heatmap-legend-dot" style="background:${item.color}"></span>${item.label}</div>`;
  }
  h += '</div>';

  // 徽章墙
  h += renderBadgeWall();

  $('#heatmapSection').innerHTML = h;
}

function renderTodayWorkout(dayIndex) {
  // 有氧替换日：显示有氧内容，原计划已顺延
  if (isDateCardio(todayStr())) {
    renderCardioDay();
    return;
  }
  $('#cardioSection').style.display = 'none';
  $('#todaySection').style.display = 'block';
  const planIds = getEffectivePlan(dayIndex);
  const diffOrder = {新手:0, 中级:1, 高级:2};
  const exs = planIds.map(id => EXERCISES.find(e => e.id === id)).filter(Boolean).sort((a,b) => (diffOrder[a.difficulty]||0) - (diffOrder[b.difficulty]||0));
  if (exs.length === 0) {
    $('#todayList').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">暂无动作，点击"📝 自定义训练计划"添加</p>';
    $('#todaySectionTitle').textContent = '📋 今日训练';
    return;
  }
  const doneCount = exs.filter(e => isDone(e.id)).length;
  let h = '<div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:' + Math.round(doneCount/exs.length*100) + '%"></div></div>';

    const done = isDone(ex.id);
    let card = makeCard(ex,i);

    if (done) card = card.replace('class="exercise-card"', 'class="exercise-card done"');
    return card;
  }).join('');

  $('#todaySectionTitle').textContent = `📋 今日训练（${doneCount}/${exs.length}）`;

  // 更新打卡按钮状态
  updateCheckinBtnState(doneCount, exs.length);
}

function makeCard(ex, index) {
  const diffClass = ex.difficulty === '新手' ? 'badge-beginner' : ex.difficulty === '高级' ? 'badge-advanced' : 'badge-intermediate';

}

// 自定义计划（基于周期日索引）
let customPlanTarget = null; // 存的是 dayIndex（0-based）
function openCustomPlan(dayIndex) {
  customPlanTarget = dayIndex;
  const cd = getCycle()[dayIndex];
  if (!cd) return;
  const currentPlan = getEffectivePlan(dayIndex);
  // 汇集该天所有肌肉群的动作（去重）
  const seen = new Set();
  const allExs = [];
  for (const m of cd.muscles) {
    EXERCISES.filter(e => e.muscle === m).forEach(e => { if (!seen.has(e.id)) { seen.add(e.id); allExs.push(e); } });
  }
  const selectedSet = new Set(currentPlan);
  $('#customPlanTitle').textContent = `📝 自定义 ${cd.name} 训练计划`;
  $('#customPlanSubtitle').textContent = `勾选想要训练的动作，顺序 = 勾选顺序。共 ${allExs.length} 个可选动作`;
  $('#customPlanError').style.display = 'none';
  const orderedExs = [];
  for (const id of currentPlan) { const ex = allExs.find(e => e.id === id); if (ex) orderedExs.push({ex, selected:true}); }
  for (const ex of allExs) { if (!selectedSet.has(ex.id)) orderedExs.push({ex, selected:false}); }
  $('#customPlanList').innerHTML = orderedExs.map(({ex, selected}) => {
    const diffClass = ex.difficulty === '新手' ? 'badge-beginner' : ex.difficulty === '高级' ? 'badge-advanced' : 'badge-intermediate';
    return `<div class="exercise-check-item${selected?' selected':''}" data-id="${ex.id}" onclick="togglePlanItem(this)"><div class="check-box"></div><span class="check-name">${ex.name}</span><span class="badge ${diffClass}" style="flex-shrink:0">${ex.difficulty}</span><span class="check-order">${selected?'#'+(currentPlan.indexOf(ex.id)+1):''}</span></div>`;
  }).join('');
  $('#customPlanModal').classList.add('show');
}
function togglePlanItem(el) { el.classList.toggle('selected'); updatePlanOrderDisplay(); }
function updatePlanOrderDisplay() {
  const selectedEls = $$('#customPlanList .exercise-check-item.selected');
  selectedEls.forEach((el, i) => { el.querySelector('.check-order').textContent = '#' + (i + 1); });
  $$('#customPlanList .exercise-check-item:not(.selected)').forEach(el => { el.querySelector('.check-order').textContent = ''; });
  $('#customPlanError').style.display = selectedEls.length === 0 ? 'block' : 'none';
}
function closeCustomPlan() { $('#customPlanModal').classList.remove('show'); customPlanTarget = null; }
function confirmCustomPlan() {
  const selectedEls = $$('#customPlanList .exercise-check-item.selected');
  if (selectedEls.length === 0) { $('#customPlanError').style.display = 'block'; return; }
  saveCustomPlan('day_' + customPlanTarget, Array.from(selectedEls).map(el => el.dataset.id));
  closeCustomPlan();
  const cd = getCycle()[customPlanTarget];
  showToast('✅ ' + (cd ? cd.name : '') + '计划已保存');
  renderAll();
}
function resetCurrentPlan() {
  if (customPlanTarget == null) return;
  resetCustomPlan('day_' + customPlanTarget);
  const cd = getCycle()[customPlanTarget];
  if (!cd) return;
  const seen = new Set();
  const allExs = [];
  for (const m of cd.muscles) {
    EXERCISES.filter(e => e.muscle === m).forEach(e => { if (!seen.has(e.id)) { seen.add(e.id); allExs.push(e); } });
  }
  const defaultSet = new Set(allExs.filter(e => e.core).map(e => e.id));
  $$('#customPlanList .exercise-check-item').forEach(item => {
    if (defaultSet.has(item.dataset.id)) item.classList.add('selected'); else item.classList.remove('selected');
  });
  updatePlanOrderDisplay();
  showToast('🔄 已恢复默认计划');
}

$('#btnCancelPlan').addEventListener('click', closeCustomPlan);
$('#btnConfirmPlan').addEventListener('click', confirmCustomPlan);
$('#btnResetPlan').addEventListener('click', resetCurrentPlan);

    $('#skipDateList').innerHTML = skips.map(s => {
      const isToday = s === today;
      return `<span style="display:inline-flex;align-items:center;gap:3px;background:${isToday?'var(--primary-dim)':'var(--bg)'};border:1px solid var(--border);border-radius:10px;padding:2px 8px;font-size:11px;color:var(--danger);">${s}${isToday?' 🔴':''} <button onclick="removeSkipDate('${s}')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;" title="删除此跳过">×</button></span>`;
    }).join('');
  }
  $('#skipDateInput').value = '';
}

function addSkipDate(dateStr) {
  if (!dateStr) return;
  const d = parseLocalDate(dateStr);
  if (isNaN(d)) return;
  const start = getStartDate();
  if (d < start) { showToast('⚠ 不能跳过起始日之前的日期'); return; }
  const today = new Date(); today.setHours(0,0,0,0);
  if (d > today) { showToast('⚠ 不能跳过未来的日期'); return; }
  const skips = getSkipDates();
  if (skips.includes(dateStr)) { showToast('⚠ 该日期已在跳过列表中'); return; }
  snapshotUndo(() => { localStorage.setItem(SKIP_KEY, JSON.stringify(skips)); }, '添加跳过 ' + dateStr);
  localStorage.setItem(SKIP_KEY, JSON.stringify([...skips, dateStr]));
  renderAll();
  updateSettingsUI();
  showToast('✅ 已添加跳过：' + dateStr);
}

function removeSkipDate(dateStr) {
  const skips = getSkipDates();
  snapshotUndo(() => { localStorage.setItem(SKIP_KEY, JSON.stringify(skips)); }, '删除跳过 ' + dateStr);
  localStorage.setItem(SKIP_KEY, JSON.stringify(skips.filter(s => s !== dateStr)));
  renderAll();
  updateSettingsUI();
  showToast('✅ 已删除跳过：' + dateStr);
}

function toggleSkipDate(dateStr) {
  // 三态循环：正常 → 跳过 → 有氧替换 → 正常
  const skips = getSkipDates();
  const cardios = getCardioDates();
  if (skips.includes(dateStr)) {
    // 当前是跳过 → 转为有氧替换
    removeSkipDate(dateStr);
    addCardioDate(dateStr);
  } else if (cardios.includes(dateStr)) {
    // 当前是有氧替换 → 恢复为正常
    removeCardioDate(dateStr);
  } else {
    // 当前是正常 → 跳过
    addSkipDate(dateStr);
  }
}

function addCardioDate(dateStr) {
  if (!dateStr) return;
  const d = parseLocalDate(dateStr);
  if (isNaN(d)) return;
  const start = getStartDate();
  if (d < start) { showToast('⚠ 不能标记起始日之前的日期'); return; }
  const today = new Date(); today.setHours(0,0,0,0);
  if (d > today) { showToast('⚠ 不能标记未来的日期'); return; }
  const cardios = getCardioDates();
  if (cardios.includes(dateStr)) { showToast('⚠ 该日期已标记为有氧日'); return; }
  snapshotUndo(() => { localStorage.setItem(CARDIO_KEY, JSON.stringify(cardios)); }, '添加有氧日 ' + dateStr);
  localStorage.setItem(CARDIO_KEY, JSON.stringify([...cardios, dateStr]));
  renderAll();
  showToast('🫀 已标记有氧日：' + dateStr);
}

function removeCardioDate(dateStr) {
  const cardios = getCardioDates();
  snapshotUndo(() => { localStorage.setItem(CARDIO_KEY, JSON.stringify(cardios)); }, '删除有氧日 ' + dateStr);
  localStorage.setItem(CARDIO_KEY, JSON.stringify(cardios.filter(s => s !== dateStr)));
  renderAll();
  showToast('✅ 已恢复为正常训练日：' + dateStr);
}

  const colorInput = dayEl.querySelector('.ce-color');

  const combinedColors = presets.map(p => p.color);
  if (nameInput) nameInput.value = combinedName;
  if (emojiSelect) {

// ── 分享热力图（Canvas 导出为高清 PNG）──
/**
 * 导出当前自然年的固定 16:9 热力图。统计限定在当前自然年内的训练开始日至今天，
 * 但网格始终完整覆盖当前日历年，防止训练起始年份改变导出尺寸。
 */
function shareHeatmap() {
  const { canvas, ctx, layout } = drawShareCanvas('heatmap');
  const start = getStartDate();
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const yearStart = new Date(today.getFullYear(), 0, 1);
  const yearEnd = new Date(today.getFullYear(), 11, 31);
  const statsStart = start > yearStart ? new Date(start) : new Date(yearStart);
  const skipSet = new Set(getSkipDates());
  const cycle = getCycle();
  const cardioSet = new Set(getCardioDates());
  let trainDays = 0;
  let skipDays = 0;
  const statsCursor = new Date(statsStart);
  while (statsCursor <= today) {
    if (skipSet.has(formatLocalDate(statsCursor))) skipDays += 1;
    else trainDays += 1;
    statsCursor.setDate(statsCursor.getDate() + 1);
  }
  let streak = 0;
  const streakCursor = new Date(today);
  while (streakCursor >= statsStart) {
    if (skipSet.has(formatLocalDate(streakCursor))) break;
    streak += 1;
    streakCursor.setDate(streakCursor.getDate() - 1);
  }

  // 网格边界固定为当前自然年的周一至周日，年初/年末的补位格也保留其位置。
  const gridStart = new Date(yearStart);
  gridStart.setDate(gridStart.getDate() - ((gridStart.getDay() + 6) % 7));
  const gridEnd = new Date(yearEnd);
  gridEnd.setDate(gridEnd.getDate() + (6 - ((gridEnd.getDay() + 6) % 7)));
  const weeks = [];
  const cursor = new Date(gridStart);
  while (cursor <= gridEnd) {
    const week = [];
    for (let day = 0; day < 7; day += 1) {
      const date = new Date(cursor);
      date.setDate(date.getDate() + day);
      week.push(date);
    }
    weeks.push(week);
    cursor.setDate(cursor.getDate() + 7);
  }

  ctx.textAlign = 'left';
  ctx.fillStyle = '#e4e2df';
  ctx.font = 'bold 38px "Microsoft YaHei","PingFang SC",sans-serif';
  ctx.fillText('🏋️ FitnessTracker · 训练热力图', layout.header.x, layout.header.y + 58);
  ctx.font = '22px "Microsoft YaHei","PingFang SC",sans-serif';
  let statsX = layout.header.x;
  const statParts = [
    { value: String(trainDays), label: ' 天训练', color: '#ff6b35' },
    { value: String(skipDays), label: ' 天跳过', color: '#e85d75' },
    { value: String(streak), label: ' 天连续', color: '#4ecdc4' }
  ];
  statParts.forEach((part, index) => {
    ctx.fillStyle = part.color;
    ctx.fillText(part.value, statsX, layout.header.y + 104);
    statsX += ctx.measureText(part.value).width;
    ctx.fillStyle = '#a09d98';
    ctx.fillText(part.label + (index < statParts.length - 1 ? '  ·  ' : ''), statsX, layout.header.y + 104);
    statsX += ctx.measureText(part.label + (index < statParts.length - 1 ? '  ·  ' : '')).width;
  });
  ctx.fillStyle = '#6b6864';
  ctx.fillText(`${today.getFullYear()}.${today.getMonth() + 1}.${today.getDate()}`, statsX + 18, layout.header.y + 104);

  const gridBounds = {
    x: layout.body.x,
    y: layout.body.y + 92,
    width: layout.body.width,
    height: layout.body.height - 172
  };
  const heatmap = fitHeatmapGrid(gridBounds, weeks.length, 7, 4);
  const gridX = gridBounds.x + (gridBounds.width - heatmap.width) / 2;
  const gridY = gridBounds.y;
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  roundedRect(ctx, gridX - 10, gridY - 32, heatmap.width + 20, heatmap.height + 44, 12);
  ctx.fill();

  ctx.fillStyle = '#6b6864';
  ctx.font = '17px "Microsoft YaHei","PingFang SC",sans-serif';
  weeks.forEach((week, column) => {
    const firstOfMonth = week.find(date => date.getDate() === 1);
    if (firstOfMonth) ctx.fillText(`${firstOfMonth.getMonth() + 1} 月`, gridX + column * (heatmap.cell + heatmap.gap), gridY - 12);
  });

  const todayDs = formatLocalDate(today);
  for (let column = 0; column < weeks.length; column += 1) {
    for (let row = 0; row < 7; row += 1) {
      const date = weeks[column][row];
      const dateString = formatLocalDate(date);
      const x = gridX + column * (heatmap.cell + heatmap.gap);
      const y = gridY + row * (heatmap.cell + heatmap.gap);
      const isSubdued = date < start || date > today || date < yearStart || date > yearEnd;
      if (isSubdued) ctx.fillStyle = 'rgba(255,255,255,0.04)';
      else if (skipSet.has(dateString)) ctx.fillStyle = 'rgba(232,93,117,0.4)';
      else if (cardioSet.has(dateString)) ctx.fillStyle = '#60a5fa';
      else {
        const cycleIndex = getCycleDayIndexForDate(date);
        const cycleDay = cycleIndex >= 0 ? cycle[cycleIndex] : null;
        if (cycleDay && cycleDay.colors && cycleDay.colors.length > 1) {
          const gradient = ctx.createLinearGradient(x, y, x + heatmap.cell, y + heatmap.cell);
          gradient.addColorStop(0, cycleDay.colors[0]);
          gradient.addColorStop(1, cycleDay.colors[1] || cycleDay.colors[0]);
          ctx.fillStyle = gradient;
        } else {
          ctx.fillStyle = cycleDay ? (cycleDay.colors?.[0] || cycleDay.color || '#333') : '#333';
        }
      }
      ctx.beginPath();
      roundedRect(ctx, x, y, heatmap.cell, heatmap.cell, 6);
      ctx.fill();
      if (dateString === todayDs) {
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        roundedRect(ctx, x, y, heatmap.cell, heatmap.cell, 5);
        ctx.stroke();
      }
    }
  }

  // 图例以限定最大行宽排版；小屏或翻译后文字变长时自然换到第二行。
  const legends = [
    { color: '#4ecdc4', label: '背部' }, { color: '#ff6b35', label: '胸部' }, { color: '#f0c040', label: '肩部' },
    { color: '#22c55e', label: '腹部' }, { color: '#a78bfa', label: '腿部' }, { color: '#60a5fa', label: '有氧' },
    { color: 'rgba(232,93,117,0.5)', label: '跳过' }
  ];
  const legendTop = gridY + heatmap.height + 34;
  const legendMaxWidth = Math.min(300, heatmap.width);
  const legendRows = [[]];
  let currentRowWidth = 0;
  ctx.font = '18px "Microsoft YaHei","PingFang SC",sans-serif';
  legends.forEach(legend => {
    const itemWidth = 18 + 8 + ctx.measureText(legend.label).width + 18;
    if (legendRows[legendRows.length - 1].length && currentRowWidth + itemWidth > legendMaxWidth) {
      legendRows.push([]);
      currentRowWidth = 0;
    }
    legendRows[legendRows.length - 1].push({ ...legend, width: itemWidth });
    currentRowWidth += itemWidth;
  });
  legendRows.forEach((row, rowIndex) => {
    const rowWidth = row.reduce((sum, legend) => sum + legend.width, 0);
    let x = gridX + (heatmap.width - rowWidth) / 2;
    const y = legendTop + rowIndex * 28;
    row.forEach(legend => {
      ctx.fillStyle = legend.color;
      ctx.beginPath();
      roundedRect(ctx, x, y, 14, 14, 3);
      ctx.fill();
      ctx.fillStyle = '#a09d98';
      ctx.fillText(legend.label, x + 22, y + 13);
      x += legend.width;
    });
  });

  showSharePreview(canvas, '📤 热力图分享', 'FitnessTracker-' + todayDs + '.png');
}

updateSettingsUI();
renderAll();
console.log('🏋️ 新手健身追踪器 · ' + EXERCISES.length + '个动作');
</script>
