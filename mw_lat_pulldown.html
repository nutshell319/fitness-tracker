les\":{\"featured\":\"精选\",\"not_found\":\"未找到文章\",\"categories\":\"分类\",\"tags\":\"标签\",\"related\":\"相关文章\",\"loading\":\"加载中...\",\"article_not_found\":\"文章未找到\",\"article_not_found_description\":\"您要查找的文章不存在或已被删除。\",\"back_to_articles\":\"返回文章列表\",\"by\":\"作者\",\"citations\":\"引用\",\"filters\":\"筛选\"},\"calculator\":{\"calorie\":\"卡路里计算器\",\"macro\":\"宏量营养素计算器\",\"one_rep\":\"1RM 计算器\",\"calculate\":\"计算\",\"units\":\"单位\",\"gender\":\"性别\",\"age\":\"年龄\",\"height\":\"身高\",\"weight\":\"体重\",\"feet\":\"英尺\",\"inches\":\"英寸\",\"years\":\"岁\",\"reps\":\"次\",\"day\":\"天\",\"calories\":\"卡路里\",\"metric\":\"公制\",\"imperial\":\"英制\",\"male\":\"男性\",\"female\":\"女性\",\"calorie_header\":\"根据您的个人信息和活动水平计算每日卡路里需求。\",\"calorie_harris\":\"使用 Harris-Benedict 方程精确计算 BMR。\",\"calorie_result\":\"您的每日卡路里需求\",\"activity_level\":\"活动水平\",\"goal\":\"目标\",\"activity_sedentary\":\"久坐（很少/无运动）\",\"activity_light\":\"轻度（每周 1-3 天轻度运动）\",\"activity_moderate\":\"中度（每周 3-5 天中度运动）\",\"activity_active\":\"活跃（每周 6-7 天高强度运动）\",\"activity_very_active\":\"非常活跃（高强度运动 + 体力工作）\",\"goal_extreme_loss\":\"极速减重（每周 2 磅）\",\"goal_weight_loss\":\"减重（每周 1 磅）\",\"goal_mild_loss\":\"轻度减重（每周 0.5 磅）\",\"goal_maintain\":\"保持体重\",\"goal_mild_gain\":\"轻度增重（每周 0.5 磅）\",\"goal_weight_gain\":\"增重（每周 1 磅）\",\"goal_extreme_gain\":\"极速增重（每周 2 磅）\",\"goal_extreme_loss_metric\":\"极速减重（每周 1 公斤）\",\"goal_weight_loss_metric\":\"减重（每周 0.5 公斤）\",\"goal_mild_loss_metric\":\"轻度减重（每周 0.25 公斤）\",\"goal_maintain_metric\":\"保持体重\",\"goal_mild_gain_metric\":\"轻度增重（每周 0.25 公斤）\",\"goal_weight_gain_metric\":\"增重（每周 0.5 公斤）\",\"goal_extreme_gain_metric\":\"极速增重（每周 1 公斤）\",\"macro_header\":\"宏量营养素（宏量营养素）通常被定义为人体用于产生能量的三种基质。这些能量基质包括碳水化合物、脂肪和蛋白质。宏量营养素共同构成了食物的总热量。\",\"macro_read_more\":\"了解更多关于宏量营养素及其在饮食中重要性的信息。\",\"macro_read_more_click\":\"阅读我们的指南\",\"macro_distribution\":\"宏量营养素分布\",\"macro_calories\":\"每日卡路里\",\"macro_meals_day\":\"每日用餐次数\",\"macro_daily_needs\":\"计算每日需求\",\"macro_breakdown\":\"宏量营养素分解\",\"macro_carb\":\"碳水化合物\",\"macro_protein\":\"蛛白质\",\"macro_fat\":\"脂肪\",\"per_meal\":\"每餐\",\"daily_total\":\"每日总量\",\"macro_balanced\":\"均衡型 (40/30/30)\",\"macro_low_carb\":\"低碳水 (20/40/40)\",\"macro_high_protein\":\"高蛛白 (30/40/30)\",\"macro_ketogenic\":\"生酮饮食 (5/25/70)\",\"macro_nutrients\":\"宏量营养素\",\"macro_carbs\":\"碳水化合物\",\"macro_carbs_description\":\"碳水化合物会转化为单糖——葡萄糖。葡萄糖是一种存在于所有身体组织中的糖分子。静息时，葡萄糖以一种更复杂的糖类——糖原的形式储存在肌肉和肝脏中。糖原储存在肌肉中，用于形成ATP（三磷酸腺苷），这是人体获取能量的化合物。\u003cbr /\u003e\u003cbr /\u003e长时间高强度运动会消耗糖原储备。你可能听说过“撞墙”这个现象。撞墙通常是长跑运动员使用的术语，指的是到达一个身体仿佛要垮掉的临界点。撞墙发生在运动员糖原储备耗尽时，但这种情况通常只出现在长跑运动员身上。\u003cbr /\u003e\u003cbr /\u003e1克碳水化合物等于4千卡或大卡。\",\"macro_fats\":\"脂肪\",\"macro_fats_description\":\"脂肪在长时间运动期间提供能量。脂肪在体内的利用性不如碳水化合物那么容易获得。这是因为脂肪转化为能量的过程比碳水化合物更加复杂。脂肪必须从原始的复杂形式（三酰甘油酯）分解为甘油和游离脂肪酸。这些游离脂肪酸可以被人体用来形成能量。\u003cbr /\u003e\u003cbr /\u003e脂肪不仅仅提供能量。某些类型的脂肪（磷脂）在神经周围形成保护鞘，而其他脂肪则作为重要激素（雌激素和睡酮素）的构建块。\u003cbr /\u003e\u003cbr /\u003e1克脂肪等于约9千卡或大卡。\",\"macro_proteins\":\"蛛白质\",\"macro_proteins_description\":\"只有在极端情况下，蛛白质才被用于能量产生。为了将蛛白质用作能量，它必须转化为葡萄糖或游离脂肪酸（FFAs）。如果不转化为葡萄糖或FFAs，只有氨基酸可以被用于能量。\u003cbr /\u003e\u003cbr /\u003e蛛白质作为构建块而闪闪发光。蛛白质可以作为创建新组织的基础。被称为酮的特定蛛白质可以加速或减缓体内发生的化学反应。\u003cbr /\u003e\u003cbr /\u003e1克蛛白质等于约4千卡或大卡。\",\"faq_title\":\"常见问题\",\"faq_header\":\"有其他问题且找不到您要的答案？通过\u003ca href=\\\"mailto:support@musclewiki.com\\\"\u003e\u003cspan class=\\\"font-semibold text-mw-blue hover:text-mw-blue-500\\\"\u003e发送邮件\u003c/span\u003e\u003c/a\u003e联系我们的支持团队，我们会尽快回复您。\",\"macro_faq_q_1\":\"问：我需要在训练后立即摄入碳水化合物来恢复糖原储备吗？\",\"macro_faq_a_1\":\"答：只有在两种情况下。如果您进行了高强度有氧运动（有氧运动消耗的糖原远多于力量训练），以及如果您每天训练不止一次。否则，没有必要“恢复糖原”。人体在维持糖原储备方面非常擅长，会在24小时内恢复。\",\"macro_faq_q_2\":\"问：我需要喝蛛白质奶昆吗？\",\"macro_faq_a_2\":\"答：不需要。如果您可以通过天然食物满足所有蛛白质需求，那么您应该选择这样做。事实上，研究表明天然蛛白质来源（如鸡肉和鱼肉）在支持肌肉增长方面比蛛白质奶昆更好。\",\"macro_faq_q_3\":\"问：所有人都说脂肪不好。这是真的吗？\",\"macro_faq_a_3\":\"答：脂肪是饮食中必要的组成部分。确实存在不健康的脂肪形式（主要存在于油炸食品中）。然而，在坚果、鱼类和油类中发现的脂肪类型是健康的，应该摄入以支持健康的激素产生。\",\"one_rep_header\":\"根据您当前的举重表现计算您的1RM。\",\"one_rep_warning\":\"⚠️ 在尝试大重量举重时，请始终做好充分热身并使用保护者。\
